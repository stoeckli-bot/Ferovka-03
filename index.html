function saveApiKey(){
  var k=document.getElementById('stp-apikey');
  if(!k)return;
  var val=k.value.trim();
  if(val){localStorage.setItem('ferovka_apikey',val);}
  else{localStorage.removeItem('ferovka_apikey');}
  var s=document.getElementById('apikey-status');
  if(s)s.innerHTML=val?'<span style="color:#10b981">✓ API klíč uložen</span>':'Bez API klíče nebude skenování dostupné.';
  showToast(val?'API klíč uložen ✓':'API klíč odstraněn');
}

// ── SKENOVÁNÍ ÚČTENKY ──────────────────────────────────────
function openReceiptScanner(){
  var key=localStorage.getItem('ferovka_apikey');
  if(!key){
    showToast('Nejprve zadej API klíč v Nastavení');
    return;
  }
  // vytvoř skrytý file input
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*,image/heic,image/heif';
  // capture='environment' způsobuje problémy na iOS Safari — odstraněno
  inp.style.position='fixed';
  inp.style.top='-9999px';
  document.body.appendChild(inp);
  inp.onchange=function(){
    if(!inp.files||!inp.files[0]){document.body.removeChild(inp);return;}
    var f=inp.files[0];
    document.body.removeChild(inp);
    processReceiptImage(f,key);
  };
  inp.click();
}

function processReceiptImage(file,key){
  showReceiptModal('<div style="text-align:center;padding:40px 20px"><div style="font-size:32px;margin-bottom:12px">🔍</div><div style="font-size:14px;color:var(--text2)">Analyzuji účtenku...</div></div>');
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    var mime=file.type||'image/jpeg';
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:1024,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mime,data:b64}},
            {type:'text',text:'Toto je foto účtenky. Extrahuj všechny položky. Vrať POUZE JSON array, žádný jiný text. Formát: [{"name":"název položky","price":123.50,"qty":1}]. Ceny jako čísla bez měny. Pokud množství není jasné, dej 1. Ignoruj daně, poplatky za obsluhu, celkové součty — jen jednotlivé položky.'}
          ]
        }]
      })
    })
    .then(function(r){
      if(!r.ok){
        return r.text().then(function(t){
          throw new Error('HTTP '+r.status+': '+t.slice(0,200));
        });
      }
      return r.json();
    })
    .then(function(data){
      // Zobraz API chybu pokud přišla
      if(data.error){
        showReceiptModal('<div style="text-align:center;padding:30px"><div style="font-size:28px">⚠️</div><div style="margin-top:8px;font-size:13px;font-weight:600;color:#dc2626">Chyba API</div><div style="margin-top:6px;font-size:12px;color:var(--text3);word-break:break-all">'+data.error.message+'</div><button onclick="closeReceiptModal()" class="btn btn-primary" style="margin-top:16px;width:100%">Zavřít</button></div>');
        return;
      }
      var text='';
      if(data.content&&data.content[0]&&data.content[0].text){
        text=data.content[0].text.trim();
      }
      if(!text){
        showReceiptModal('<div style="text-align:center;padding:30px"><div style="font-size:28px">😕</div><div style="margin-top:8px;font-size:13px;color:var(--text3)">API nevrátilo žádný text. Zkus znovu.</div><button onclick="closeReceiptModal()" class="btn btn-primary" style="margin-top:16px;width:100%">Zavřít</button></div>');
        return;
      }
      var items=[];
      try{
        var clean=text.replace(/```json|```/g,'').trim();
        items=JSON.parse(clean);
      }catch(e){
        showReceiptModal('<div style="text-align:center;padding:30px"><div style="font-size:28px">😕</div><div style="margin-top:8px;font-size:13px;color:var(--text3)">Nepodařilo se rozpoznat položky.</div><div style="margin-top:6px;font-size:11px;color:var(--text3);word-break:break-all;max-height:100px;overflow:auto">'+text.slice(0,200)+'</div><button onclick="closeReceiptModal()" class="btn btn-primary" style="margin-top:16px;width:100%">Zavřít</button></div>');
        return;
      }
      renderReceiptItems(items);
    })
    .catch(function(e){
      showReceiptModal('<div style="text-align:center;padding:30px"><div style="font-size:28px">⚠️</div><div style="margin-top:8px;font-size:13px;color:var(--text3)">Chyba spojení: '+e.message+'</div><button onclick="closeReceiptModal()" class="btn btn-primary" style="margin-top:16px;width:100%">Zavřít</button></div>');
    });
  };
  reader.readAsDataURL(file);
}

function renderReceiptItems(items){
  window._receiptItems=items;
  window._receiptSplit=items.map(function(it){
    return [{famId: st.families.length>0?st.families[0].id:'', qty: it.qty||1, amt: null}];
  });
  // mode: 'qty' nebo 'amt'
  window._receiptSplitMode=items.map(function(){return 'qty';});

  function famOpts(selId){
    return st.families.map(function(f){
      return '<option value="'+f.id+'"'+(f.id===selId?' selected':'')+'>'+f.name+'</option>';
    }).join('');
  }

  function buildRows(){
    return items.map(function(it,i){
      var totalPrice=it.price*(it.qty||1);
      var mode=window._receiptSplitMode[i];
      var splits=window._receiptSplit[i];
      var splitRows=splits.map(function(sp,si){
        if(mode==='amt'){
          return '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'
            +'<select style="flex:1;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 4px;background:var(--surface);color:var(--text)" onchange="window._receiptSplit['+i+']['+si+'].famId=this.value">'+famOpts(sp.famId)+'</select>'
            +'<input type="text" inputmode="decimal" value="'+(sp.amt!==null?sp.amt:'')+'" placeholder="Kč" style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:right" onchange="window._receiptSplit['+i+']['+si+'].amt=parseFloat(this.value.replace(\',\',\'.\'))||0;refreshReceiptRow('+i+')">'
            +(splits.length>1?'<button onclick="window._receiptSplit['+i+'].splice('+si+',1);refreshReceiptRow('+i+')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px">✕</button>':'')
          +'</div>';
        } else {
          return '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'
            +(it.qty>1?'<input type="number" min="0" max="'+(it.qty||1)+'" value="'+sp.qty+'" style="width:44px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:center" onchange="window._receiptSplit['+i+']['+si+'].qty=Math.max(0,parseInt(this.value)||0);refreshReceiptRow('+i+')"><span style="font-size:11px;color:var(--text3)">ks →</span>'
            :'')
            +'<select style="flex:1;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 4px;background:var(--surface);color:var(--text)" onchange="window._receiptSplit['+i+']['+si+'].famId=this.value">'+famOpts(sp.famId)+'</select>'
            +(splits.length>1?'<button onclick="window._receiptSplit['+i+'].splice('+si+',1);refreshReceiptRow('+i+')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px">✕</button>':'')
          +'</div>';
        }
      }).join('');

      // warning
      var warning='';
      if(mode==='amt'){
        var usedAmt=splits.reduce(function(s,r){return s+(r.amt||0);},0);
        var diff=Math.round((totalPrice-usedAmt)*100)/100;
        if(Math.abs(diff)>0.5) warning='<div style="font-size:10px;color:#f59e0b;margin-top:3px">⚠ zbývá '+fmt(diff)+' Kč</div>';
      } else if(it.qty>1){
        var usedQty=splits.reduce(function(s,r){return s+(parseInt(r.qty)||0);},0);
        var rem=(it.qty||1)-usedQty;
        if(rem>0) warning='<div style="font-size:10px;color:#f59e0b;margin-top:3px">⚠ '+rem+' ks nepřiřazeno</div>';
      }

      var addBtn='<button onclick="window._receiptSplit['+i+'].push({famId:\''+(st.families.length>0?st.families[0].id:'')+'\',qty:0,amt:0});refreshReceiptRow('+i+')" style="font-size:11px;color:var(--c1);background:none;border:none;cursor:pointer;padding:2px 0;margin-top:2px">+ přidat skupinu</button>';

      var modeToggle='<button onclick="window._receiptSplitMode['+i+']=window._receiptSplitMode['+i+']==='+"'amt'"+'?'+"'qty'"+':"'+"'amt'"+';window._receiptSplit['+i+']=[{famId:\''+(st.families.length>0?st.families[0].id:'')+'\',qty:'+(it.qty||1)+',amt:null}];refreshReceiptRow('+i+')" style="font-size:10px;color:var(--c1);background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;padding:2px 6px;margin-left:6px">'
        +(mode==='amt'?'÷ ks':'÷ Kč')+'</button>';

      return '<div style="padding:10px 0;border-bottom:1px solid var(--border)" id="rcpt-row-'+i+'">'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<input type="checkbox" id="rcpt-chk-'+i+'" checked style="width:16px;height:16px;accent-color:var(--c1);flex-shrink:0">'
          +'<div style="flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+it.name+(it.qty>1?' <span style="color:var(--text3);font-weight:400">×'+it.qty+'</span>':'')+'</div>'
          +'<div style="display:flex;align-items:center;flex-shrink:0">'
            +'<div style="font-size:13px;font-weight:700;color:var(--c1);white-space:nowrap">'+fmt(totalPrice)+' Kč</div>'
            +modeToggle
          +'</div>'
        +'</div>'
        +'<div id="rcpt-splits-'+i+'" style="padding-left:24px">'+splitRows+warning+addBtn+'</div>'
      +'</div>';
    }).join('');
  }

  var total=items.reduce(function(s,it){return s+it.price*(it.qty||1);},0);

  showReceiptModal(
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      +'<div><div style="font-size:16px;font-weight:800">Položky účtenky</div><div style="font-size:11px;color:var(--text3)">'+items.length+' položek · celkem '+fmt(total)+' Kč</div></div>'
      +'<button onclick="closeReceiptModal()" style="background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:4px">✕</button>'
    +'</div>'
    +'<div style="max-height:55vh;overflow-y:auto;margin-bottom:14px" id="rcpt-rows-wrap">'+buildRows()+'</div>'
    +'<div style="display:flex;gap:8px">'
      +'<button onclick="closeReceiptModal()" class="btn btn-outline" style="flex:1">Zrušit</button>'
      +'<button onclick="importReceiptItemsSplit()" class="btn btn-primary" style="flex:1">Přidat výdaje →</button>'
    +'</div>'
  );
}

function refreshReceiptRow(i){
  var el=document.getElementById('rcpt-splits-'+i);
  if(!el)return;
  var it=window._receiptItems[i];
  var splits=window._receiptSplit[i];
  var mode=window._receiptSplitMode[i];
  var totalPrice=it.price*(it.qty||1);

  function famOpts(selId){
    return st.families.map(function(f){
      return '<option value="'+f.id+'"'+(f.id===selId?' selected':'')+'>'+f.name+'</option>';
    }).join('');
  }

  var splitRows=splits.map(function(sp,si){
    if(mode==='amt'){
      return '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'
        +'<select style="flex:1;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 4px;background:var(--surface);color:var(--text)" onchange="window._receiptSplit['+i+']['+si+'].famId=this.value">'+famOpts(sp.famId)+'</select>'
        +'<input type="text" inputmode="decimal" value="'+(sp.amt!==null&&sp.amt!==0?sp.amt:'')+'" placeholder="Kč" style="width:70px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:right" onchange="window._receiptSplit['+i+']['+si+'].amt=parseFloat(this.value.replace(\',\',\'.\'))||0;refreshReceiptRow('+i+')">'
        +(splits.length>1?'<button onclick="window._receiptSplit['+i+'].splice('+si+',1);refreshReceiptRow('+i+')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px">✕</button>':'')
      +'</div>';
    } else {
      return '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'
        +(it.qty>1?'<input type="number" min="0" max="'+(it.qty||1)+'" value="'+sp.qty+'" style="width:44px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:center" onchange="window._receiptSplit['+i+']['+si+'].qty=Math.max(0,parseInt(this.value)||0);refreshReceiptRow('+i+')"><span style="font-size:11px;color:var(--text3)">ks →</span>':'')
        +'<select style="flex:1;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 4px;background:var(--surface);color:var(--text)" onchange="window._receiptSplit['+i+']['+si+'].famId=this.value">'+famOpts(sp.famId)+'</select>'
        +(splits.length>1?'<button onclick="window._receiptSplit['+i+'].splice('+si+',1);refreshReceiptRow('+i+')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px">✕</button>':'')
      +'</div>';
    }
  }).join('');

  var warning='';
  if(mode==='amt'){
    var usedAmt=splits.reduce(function(s,r){return s+(r.amt||0);},0);
    var diff=Math.round((totalPrice-usedAmt)*100)/100;
    if(Math.abs(diff)>0.5) warning='<div style="font-size:10px;color:#f59e0b;margin-top:3px">⚠ zbývá '+fmt(diff)+' Kč</div>';
  } else if(it.qty>1){
    var usedQty=splits.reduce(function(s,r){return s+(parseInt(r.qty)||0);},0);
    var rem=(it.qty||1)-usedQty;
    if(rem>0) warning='<div style="font-size:10px;color:#f59e0b;margin-top:3px">⚠ '+rem+' ks nepřiřazeno</div>';
  }

  el.innerHTML=splitRows+warning
    +'<button onclick="window._receiptSplit['+i+'].push({famId:\''+(st.families.length>0?st.families[0].id:'')+'\',qty:0,amt:0});refreshReceiptRow('+i+')" style="font-size:11px;color:var(--c1);background:none;border:none;cursor:pointer;padding:2px 0;margin-top:2px">+ přidat skupinu</button>';
}

function importReceiptItemsSplit(){
  var items=window._receiptItems;
  var splits=window._receiptSplit;
  var modes=window._receiptSplitMode;
  var added=0;
  items.forEach(function(it,i){
    var chk=document.getElementById('rcpt-chk-'+i);
    if(!chk||!chk.checked)return;
    var itemSplits=splits[i]||[];
    var mode=modes[i]||'qty';

    if(itemSplits.length===1&&mode==='qty'){
      // jedna skupina celá položka
      var famId=itemSplits[0].famId;
      var fam=st.families.find(function(f){return f.id===famId;});
      if(!fam)return;
      var parts={};parts[famId]=fam.members||1;
      st.expenses.push({id:'e'+Date.now()+Math.random().toString(36).slice(2),desc:it.name,amount:it.price*(it.qty||1),currency:fForm.currency||'CZK',payer:famId,participants:parts,splitMode:'equal',cat:'other',date:new Date().toISOString().slice(0,10),note:'Ze účtenky',createdAt:Date.now()});
      added++;
    } else if(mode==='amt'){
      // rozdělení částkou — jeden výdaj s customSplit
      var totalPrice=it.price*(it.qty||1);
      var customSplit={};
      var participants={};
      var firstFamId=itemSplits[0]?itemSplits[0].famId:'';
      itemSplits.forEach(function(sp){
        if(!sp.famId||!sp.amt)return;
        var fam=st.families.find(function(f){return f.id===sp.famId;});
        if(!fam)return;
        customSplit[sp.famId]=[{count:1,price:sp.amt,label:''}];
        participants[sp.famId]=fam.members||1;
      });
      if(Object.keys(customSplit).length===0)return;
      st.expenses.push({id:'e'+Date.now()+Math.random().toString(36).slice(2),desc:it.name,amount:totalPrice,currency:fForm.currency||'CZK',payer:firstFamId,participants:participants,splitMode:'custom',customSplit:customSplit,cat:'other',date:new Date().toISOString().slice(0,10),note:'Ze účtenky',createdAt:Date.now()});
      added++;
    } else {
      // rozdělení podle kusů — výdaj za každou skupinu
      itemSplits.forEach(function(sp){
        var qty=parseInt(sp.qty)||0;
        if(!qty||!sp.famId)return;
        var fam=st.families.find(function(f){return f.id===sp.famId;});
        if(!fam)return;
        var parts={};parts[sp.famId]=fam.members||1;
        st.expenses.push({id:'e'+Date.now()+Math.random().toString(36).slice(2),desc:it.name+' ×'+qty,amount:it.price*qty,currency:fForm.currency||'CZK',payer:sp.famId,participants:parts,splitMode:'equal',cat:'other',date:new Date().toISOString().slice(0,10),note:'Ze účtenky',createdAt:Date.now()});
        added++;
      });
    }
  });
  save();
  closeReceiptModal();
  destroyCharts();render();
  showToast(added+' výdajů přidáno ze účtenky ✓');
}

function importReceiptItems(items){
  var added=0;

    var chk=document.getElementById('rcpt-chk-'+i);
    if(!chk||!chk.checked)return;
    var famSel=document.getElementById('rcpt-fam-'+i);
    var famId=famSel?famSel.value:(st.families[0]?st.families[0].id:'');

    var exp={
      id:'e'+Date.now()+Math.random().toString(36).slice(2),
      desc:it.name+(it.qty>1?' ×'+it.qty:''),

    };

  });
  save();

  showToast(added+' výdajů přidáno ze účtenky ✓');

function fetchCNBRates(){
  if(btn){btn.textContent='⏳';btn.disabled=true;}

  function applyRates(eurCzk, usdCzk){
    if(eurCzk>1) st.rates.EUR=Math.round(eurCzk*100)/100;
    if(usdCzk>1) st.rates.USD=Math.round(usdCzk*100)/100;
    save();destroyCharts();render();
    showToast('Kurzy aktualizovány ✓');
  }

  function onError(e){
    console.warn('Rates fetch failed:',e);
    showToast('Nepodařilo se načíst kurzy ČNB');
    if(btn){btn.textContent='🌐 Kurzy ČNB';btn.disabled=false;}
  }

  // Primary: open.er-api.com -- free, no key, CORS ok
  var controller=new AbortController();
  var timer=setTimeout(function(){controller.abort();},8000);
  fetch('https://open.er-api.com/v6/latest/EUR',{signal:controller.signal})
    .then(function(r){clearTimeout(timer);if(!r.ok)throw r.status;return r.json();})
    .then(function(d){
      if(d.rates&&d.rates.CZK&&d.rates.USD){
        applyRates(d.rates.CZK, d.rates.CZK/d.rates.USD);
      } else throw 'no rates';
    })
    .catch(function(e){
      clearTimeout(timer);
      // Fallback: frankfurter.app
      var c2=new AbortController();
      var t2=setTimeout(function(){c2.abort();},8000);
      fetch('https://api.frankfurter.app/latest?base=EUR&symbols=CZK,USD',{signal:c2.signal})
        .then(function(r){clearTimeout(t2);if(!r.ok)throw r.status;return r.json();})
        .then(function(d){
          if(d.rates&&d.rates.CZK&&d.rates.USD){
            applyRates(d.rates.CZK, d.rates.CZK/d.rates.USD);
          } else throw 'no rates';
        })
        .catch(function(e2){clearTimeout(t2);onError(e2);});
    });
}


// BALANCE ROWS — Dostanou / Dluží sections, bar=paid, marker=share
function buildSparkline(w,h){
  // Mini čárový graf — kumulativní výdaje po dnech akce
  if(st.expenses.length<2) return '';
  var sorted=st.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var byDay={};
  sorted.forEach(function(e){ byDay[e.date]=(byDay[e.date]||0)+toBase(e.amount,e.currency); });
  var days=Object.keys(byDay).sort();
  if(days.length<2) return '';
  // Kumulativní součty
  var cumul=[], sum=0;
  days.forEach(function(d){ sum+=byDay[d]; cumul.push(sum); });
  var max=cumul[cumul.length-1]||1;
  var pts=cumul.map(function(v,i){
    var x=Math.round(i/(cumul.length-1)*(w-4)+2);
    var y=Math.round(h-2-(v/max)*(h-4));
    return x+','+y;
  }).join(' ');
  // Area fill
  var first=pts.split(' ')[0]; var last=pts.split(' ').slice(-1)[0];
  var lx=last.split(',')[0];
  return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" style="overflow:visible">'
    +'<defs><linearGradient id="spk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/><stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/></linearGradient></defs>'
    +'<polygon points="'+first.split(',')[0]+','+(h-2)+' '+pts+' '+lx+','+(h-2)+'" fill="url(#spk)"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>'
  +'</svg>';
}

function calcBalanceScore(){
  if(!st.families.length||!st.expenses.length) return null;
  var total=st.expenses.reduce(function(s,e){return s+toBase(e.amount,e.currency);},0);
  if(!total) return null;
  // Součet odchylek = součet převodů z vyúčtování
  var bal=calcBal();
  var tr=calcSettle(bal);
  var transfers=tr.reduce(function(s,t){return s+(t.amount||0);},0);
  var score=Math.max(0,Math.min(100,Math.round((1-transfers/total)*100)));
  return score;
}

function buildGaugeKPI(){
  var score=calcBalanceScore();
  var hasFams=score!==null;
  var bal_score=hasFams?score:50;
  var pct=hasFams?(100-bal_score):50;
  var gauge_pct=pct;
  var clr=pct<=30?'#10b981':pct<=60?'#f59e0b':'#ef4444';
  var label=!hasFams?'Zadna data':(pct+'% vydaju ceka na prevod');

  // SVG gauge: cx=60,cy=64, R=42, úhel od 180° do 0° (zleva doprava)
  // 3 segmenty: červená 0-40%, žlutá 40-70%, zelená 70-100%
  // Každý segment je část polokruhu
  var cx=60, cy=64, R=42, sw=7;
  function arcPath(a1,a2){
    // a1,a2 v degrees, 180=vlevo, 0=vpravo
    var r1=a1*Math.PI/180, r2=a2*Math.PI/180;
    var x1=cx+R*Math.cos(Math.PI-r1*(Math.PI/180)), y1=cy-R*Math.sin(Math.PI-r1*(Math.PI/180));
    // Lepší: přímý výpočet
    // angle 0%=180°, 100%=0° — tedy angle = 180 - pct*1.8
    return '';
  }
  // Polokruh: 0%=levý konec (180°), 100%=pravý konec (0°)
  // Segment od p1% do p2%: úhly 180-p1*1.8 až 180-p2*1.8
  function seg(p1,p2,clrS){
    var a1=(180-p1*1.8)*Math.PI/180;
    var a2=(180-p2*1.8)*Math.PI/180;
    var x1=Math.round((cx+R*Math.cos(a1))*100)/100;
    var y1=Math.round((cy-R*Math.sin(a1))*100)/100;
    var x2=Math.round((cx+R*Math.cos(a2))*100)/100;
    var y2=Math.round((cy-R*Math.sin(a2))*100)/100;
    var lg=(p2-p1)>50?1:0;
    return '<path d="M '+x1+','+y1+' A '+R+','+R+' 0 '+lg+',1 '+x2+','+y2+'" stroke="'+clrS+'" stroke-width="'+sw+'" stroke-linecap="butt" fill="none"/>';
  }
  // Track (šedý)
  var track=seg(0,100,'#e5e7eb');
  // Tři barevné segmenty
  var s1=seg(0,40,'#ef4444');
  var s2=seg(40,70,'#f59e0b');
  var s3=seg(70,100,'#10b981');
  // Ukazatel — čárka od středu ke kraji oblouku na pozici pct
  var needleA=(180-gauge_pct*1.8)*Math.PI/180;
  var nx1=Math.round((cx+14*Math.cos(needleA))*100)/100; // inner
  var ny1=Math.round((cy-14*Math.sin(needleA))*100)/100;
  var nx2=Math.round((cx+R*Math.cos(needleA))*100)/100;  // outer (na oblouku)
  var ny2=Math.round((cy-R*Math.sin(needleA))*100)/100;
  var needle='<line x1="'+nx1+'" y1="'+ny1+'" x2="'+nx2+'" y2="'+ny2+'" stroke="'+clr+'" stroke-width="2.5" stroke-linecap="round"/>';
  // Střed
  var center='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="var(--text3)"/>';

  var svg='<svg viewBox="0 0 120 72" width="80" height="48" xmlns="http://www.w3.org/2000/svg">'
    +track+s1+s2+s3+needle+center
    +'<text x="'+cx+'" y="58" text-anchor="middle" font-size="15" font-weight="800" fill="var(--text)" font-family="Figtree,system-ui">'+(hasFams?gauge_pct+'%':'–')+'</text>'
  +'</svg>';

  // Skupiny v plusu / mínusu
  var bal=calcBal();
  var posGrps=[],negGrps=[];
  var posSum=0,negSum=0;
  Object.entries(bal).forEach(function(e){
    var id=e[0], v=e[1];
    if(v>0.5){posGrps.push(id);posSum+=v;}
    else if(v<-0.5){negGrps.push(id);negSum+=v;}
  });
  var context='<div style="display:flex;justify-content:center;gap:10px;margin-top:6px">'
    +(posGrps.length?'<div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0"></div><span style="font-size:11px;font-weight:600;color:var(--text)">'+posGrps.length+'</span><span style="font-size:10px;color:var(--text3)">v plusu</span></div>':'')
    +(negGrps.length?'<div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0"></div><span style="font-size:11px;font-weight:600;color:var(--text)">'+negGrps.length+'</span><span style="font-size:10px;color:var(--text3)">v mínusu</span></div>':'')
  +'</div>';

  return '<div style="display:flex;flex-direction:column;align-items:center;width:100%;padding-top:2px">'
    // Desktop: SVG gauge
    +'<div class="gauge-desktop">'
      +svg
      +'<div style="font-size:10px;font-weight:600;color:'+clr+';margin-top:1px;text-align:center;letter-spacing:.01em">'+label+'</div>'
      +(hasFams?context:'')
    +'</div>'
    // Mobile: flat číslo + plus/mínus řádky
    +'<div class="gauge-mobile" style="display:none;width:100%">'
      +'<div style="font-size:22px;font-weight:800;letter-spacing:-.03em;color:'+clr+';line-height:1">'+(hasFams?gauge_pct+'%':'–')+'</div>'
      +'<div style="font-size:10px;color:'+clr+';font-weight:600;margin-top:2px">nevyrovnáno</div>'
      +(hasFams
        ?'<div style="display:flex;flex-direction:column;gap:3px;margin-top:6px">'
          +(posGrps.length?'<div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0"></div><span style="font-size:12px;font-weight:700;color:var(--text)">'+posGrps.length+'</span><span style="font-size:11px;color:var(--text3)">skupin v plusu</span></div>':'')
          +(negGrps.length?'<div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0"></div><span style="font-size:12px;font-weight:700;color:var(--text)">'+negGrps.length+'</span><span style="font-size:11px;color:var(--text3)">skupin v mínusu</span></div>':'')
        +'</div>'
        :'<div style="font-size:11px;color:var(--text3);margin-top:4px">Žádná data</div>'
      )
    +'</div>'
  +'</div>';
  +'</div>';
}

function buildBalanceRows(){
  var bal=calcBal(); // použij stejný výpočet jako calcSettle — zaručí konzistenci
  var data=st.families.map(function(f){
    var paid=Math.round(st.expenses.filter(function(e){return e.payer===f.id;}).reduce(function(s,e){return s+toBase(e.amount,e.currency);},0));
    var v=bal[f.id]||0;
    var share=Math.round(paid-v); // share = paid - bilance (protože bal = paid - share)
    return {f:f, paid:paid, share:share, diff:v};
  }).filter(function(d){return d.paid>0||Math.abs(d.share)>0;})
    .sort(function(a,b){return b.diff-a.diff;});

  if(!data.length) return '<div style="color:var(--text3);font-size:13px;padding:1rem 0;text-align:center">Žádné výdaje</div>';

  var maxVal=Math.max.apply(null, data.map(function(d){return Math.max(d.paid,d.share,1);}));

  // Column header — legenda grouped bars
  var header='<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap">'+
    '<div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:8px;border-radius:2px;background:#4F46E5"></div><span style="font-size:11px;color:var(--text3)">Zaplatil</span></div>'+
    '<div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:6px;border-radius:2px;background:#A5B4FC"></div><span style="font-size:11px;color:var(--text3)">Podíl (zelená = víc zaplatil, červená = méně)</span></div>'+
  '</div>';

  function renderRow(d){
    var ci=gc(d.f.id);
    var isPos=d.diff>0.5, isNeg=d.diff<-0.5;
    var paidClr=isPos?'#4F46E5':isNeg?'#EF4444':'#9CA3AF';
    var shareClr=isPos?'#A5B4FC':isNeg?'#FCA5A5':'#D1D5DB';
    var diffClr=isPos?'#16a34a':isNeg?'#dc2626':'var(--text3)';
    var diffTxt=(isPos?'+':isNeg?'−':'')+fmt(Math.abs(d.diff))+' Kč';
    var paidW=(d.paid/maxVal*100).toFixed(1);
    var shareW=(d.share/maxVal*100).toFixed(1);
    var subLabel='<div style="display:flex;gap:6px;margin-top:3px">'
      +'<span style="font-size:10px;color:var(--text3)">'+fmt(d.paid)+' Kč zaplatil</span>'
      +'<span style="font-size:10px;color:var(--text3)">'+fmt(d.share)+' Kč podíl</span>'
      +'</div>';
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<div style="width:28px;height:28px;min-width:28px;border-radius:50%;background:'+ci.bg+';color:'+ci.txt+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">'+ini(d.f.name)+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px">'+d.f.name+'</div>'+
        '<div style="display:flex;gap:3px;height:8px;align-items:center">'+
          '<div style="flex:'+paidW+';height:8px;background:'+paidClr+';border-radius:2px 0 0 2px;min-width:2px"></div>'+
          '<div style="flex:'+shareW+';height:6px;background:'+shareClr+';border-radius:0 2px 2px 0;min-width:2px"></div>'+
        '</div>'+
        subLabel+
      '</div>'+
      '<div style="font-size:12px;font-weight:800;color:'+diffClr+';white-space:nowrap;flex-shrink:0;min-width:56px;text-align:right">'+diffTxt+'</div>'+
    '</div>';
  }

  var pos=data.filter(function(d){return d.diff>0.5;});
  var neg=data.filter(function(d){return d.diff<=-0.5;});
  var zer=data.filter(function(d){return Math.abs(d.diff)<=0.5;});
  var html=header;
  if(pos.length){
    html+='<div style="font-size:11px;font-weight:700;color:#16a34a;padding:8px 0 2px;letter-spacing:.04em;text-transform:uppercase">Dostanou</div>';
    html+=pos.map(renderRow).join('');
  }
  if(zer.length) html+=zer.map(renderRow).join('');
  if(neg.length){
    html+='<div style="font-size:11px;font-weight:700;color:#dc2626;padding:8px 0 2px;letter-spacing:.04em;text-transform:uppercase">Dluží</div>';
    html+=neg.map(renderRow).join('');
  }
  var posTotal=pos.reduce(function(s,d){return s+d.diff;},0);
  var negTotal=Math.abs(neg.reduce(function(s,d){return s+d.diff;},0));
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:13px 16px;background:var(--surface2);border-radius:12px">'+
    '<div style="display:flex;align-items:center;gap:10px">'+

// Period comparison badge — per spec
function buildPeriodBadge(){
  var exps=st.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  if(exps.length<2) return '';
  // Use relative split: last half vs first half of expense dates
  var dates=exps.map(function(e){return e.date;});
  var minDate=dates[0], maxDate=dates[dates.length-1];
  if(minDate===maxDate) return '';
  // Find midpoint date
  var mid=new Date((new Date(minDate).getTime()+new Date(maxDate).getTime())/2);
  var midStr=mid.toISOString().slice(0,10);
  var last30=exps.filter(function(e){return e.date>=midStr;}).reduce(function(s,e){return s+toBase(e.amount,e.currency);},0);
  var prev30=exps.filter(function(e){return e.date<midStr;}).reduce(function(s,e){return s+toBase(e.amount,e.currency);},0);
  if(!prev30) return '';
  var diff=Math.round(last30-prev30);
  var isUp=diff>0, isZero=diff===0;
  // Colors per spec
  var valClr=isZero?'#6B7280':isUp?'#111827':'#111827';
  var iconBg=isZero?'#E5E7EB':isUp?'#DCFCE7':'#FEE2E2';
  var iconClr=isZero?'#6B7280':isUp?'#16A34A':'#DC2626';
  var arrowSvg=isZero
    ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+iconClr+'" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    :(isUp
      ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+iconClr+'" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>'
      :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+iconClr+'" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>');
  var valStr=(isUp?'+':isZero?'':'-')+fmt(Math.abs(diff))+' Kč';
  return '<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;background:#F3F4F6;border-radius:100px;flex-shrink:0;white-space:nowrap">'
    +'<div style="width:20px;height:20px;min-width:20px;border-radius:50%;background:'+iconBg+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+arrowSvg+'</div>'
    +'<span style="font-size:12px;font-weight:700;color:'+valClr+'">'+valStr+'</span>'
    +'<span style="font-size:11px;color:#9CA3AF">vs. minulé</span>'
  +'</div>';
}

function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function chartTextColor(){return isDark()?'#8a8680':'#6b6760';}
function chartGridColor(){return isDark()?'#2e2c29':'#f0ede8';}

function buildPayerBoard(){
  var dark=isDark();
  var PALETTE=dark
    ?['#818cf8','#22d3ee','#34d399','#f87171','#f472b6','#fb923c','#a78bfa','#4ade80']
    :['#4f46e5','#06b6d4','#10b981','#ef4444','#ec4899','#f97316','#8b5cf6','#22c55e'];
  var pt={};
  st.expenses.forEach(function(e){pt[e.payer]=(pt[e.payer]||0)+toBase(e.amount,e.currency);});
  var fams=st.families.filter(function(f){return pt[f.id]>0;});
  if(!fams.length){
    return '<div style="color:var(--text3);font-size:13px;padding:1rem 0;text-align:center">Zatím žádné výdaje</div>';
  }
  var total=Object.values(pt).reduce(function(s,v){return s+v;},0);
  var sorted=fams.slice().sort(function(a,b){return (pt[b.id]||0)-(pt[a.id]||0);});
  var maxV=pt[sorted[0].id]||1;
  var medals=['🥇','🥈','🥉'];
  return '<div class="payer-board">'+sorted.map(function(f,i){
    var v=pt[f.id]||0;
    var fi=st.families.findIndex(function(x){return x.id===f.id;});
    var col=PALETTE[fi%PALETTE.length];
    var pct=Math.round((v/total)*100);
    var barW=Math.round((v/maxV)*100);
    var rank=medals[i]||(i+1)+'';
    return '<div class="payer-row">'
      +'<div class="payer-rank">'+rank+'</div>'
      +'<div class="av" style="width:32px;height:32px;font-size:11px;background:'+col+(dark?'22':'18')+';color:'+col+';flex-shrink:0">'+ini(f.name)+'</div>'
      +'<div class="payer-info">'
        +'<div class="payer-name-row">'
          +'<span class="payer-name">'+f.name+'</span>'
          +'<span class="payer-amt">'+fmt(v)+' '+baseSym()+'</span>'
        +'</div>'
        +'<div class="payer-bar-bg"><div class="payer-bar-fill" style="width:'+barW+'%;background:'+col+'"></div></div>'
        +'<div class="payer-pct">'+pct+'% z celku</div>'
      +'</div>'
    +'</div>';
  }).join('')+'</div>';
}

function initCharts(){
  if(typeof Chart === 'undefined'){
    setTimeout(initCharts, 200);
    return;
  }
  var dark=isDark();
  var textC=dark?'#7578a0':'#5e6082';
  var gridC=dark?'#252a3d':'#e3e4f0';
  var surfC=dark?'#171a27':'#ffffff';
  var PALETTE=dark
    ?['#818cf8','#22d3ee','#34d399','#fbbf24','#f472b6','#fb923c','#a78bfa','#4ade80','#e879f9','#f87171']
    :['#6366f1','#06b6d4','#10b981','#f59e0b','#ec4899','#f97316','#8b5cf6','#22c55e','#d946ef','#ef4444'];

  // -- Leaderboard rendered inline via buildPayerBoard(), no Chart.js needed --

  var bal=calcBal();

  // Timeline chart
  drawTimeline('cumul');

  var de=document.getElementById('ch-payer-donut');
  if(de){
    var pt3={};st.expenses.forEach(function(e){pt3[e.payer]=(pt3[e.payer]||0)+toBase(e.amount,e.currency);});
    var df=st.families.filter(function(f){return (pt3[f.id]||0)>0;}).sort(function(a,b){return (pt3[b.id]||0)-(pt3[a.id]||0);});
    if(df.length>0){
      charts.donut=new Chart(de,{
        type:'doughnut',
        data:{
          labels:df.map(function(f){return f.name;}),
          datasets:[{
            data:df.map(function(f){return Math.round(pt3[f.id]||0);}),
            backgroundColor:df.map(function(f,i){return PALETTE[st.families.findIndex(function(x){return x.id===f.id;})%PALETTE.length];}),
            borderWidth:3, borderColor:surfC, hoverOffset:4
          }]
        },
        options:{
          responsive:false, maintainAspectRatio:false, cutout:'70%',
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:function(ctx){return' '+ctx.label+': '+fmt(ctx.raw)+' '+baseSym();}}}
          },
          animation:{duration:600,easing:'easeOutQuart'}
        }
      });
    }
  }
}


function setTimelineMode(mode, el){
  if(!el) return;
  // Find all tl-btn siblings (parent container)
  var parent=el.closest('[data-tl-group]')||el.parentElement;
  parent.querySelectorAll('.tl-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  drawTimeline(mode);
}

function drawTimeline(mode){
  var dark=isDark();
  var textC=dark?'#7578a0':'#5e6082';
  var gridC=dark?'#252a3d':'#e3e4f0';
  var c1=dark?'#818cf8':'#6366f1';   // indigo -- cumulative line
  var c2=dark?'rgba(34,211,238,.7)':'rgba(6,182,212,.65)'; // cyan -- daily bars
  var te=document.getElementById('ch-timeline');
  if(!te)return;

  var byDate={};
  st.expenses.forEach(function(e){
    var d=e.date||''; if(!d)return;
    byDate[d]=(byDate[d]||0)+toBase(e.amount,e.currency);
  });

  if(!Object.keys(byDate).length){
    if(charts.timeline){charts.timeline.destroy();delete charts.timeline;}
    return;
  }

  var dates=Object.keys(byDate).sort();
  var dailyVals=dates.map(function(d){return Math.round(byDate[d]);});
  var labels=dates.map(function(d){var p=d.split('-');return p[2]+'.'+p[1]+'.';});
  var cum=0;
  var cumulVals=dailyVals.map(function(v){cum+=v;return cum;});

  if(charts.timeline){charts.timeline.destroy();delete charts.timeline;}
  var canvas=document.getElementById('ch-timeline');
  if(!canvas)return;

  if(mode==='daily'){
    // Pure bar chart for daily expenses only - less rounded
    charts.timeline=new Chart(canvas,{
      type:'bar',
      data:{labels:labels,datasets:[{
        label:'Denní výdaje',
        data:dailyVals,
        backgroundColor:dark?'rgba(129,140,248,.5)':'rgba(99,102,241,.45)',
        borderRadius:4,
        borderSkipped:false,
        maxBarThickness:32
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:dark?'#1a1d33':'#ffffff',
            titleColor:dark?'#eeeeff':'#1a1f36',bodyColor:dark?textC:'#4a5068',
            borderColor:dark?'rgba(130,120,255,.2)':'rgba(0,0,0,.08)',
            borderWidth:1,padding:12,cornerRadius:10,boxPadding:4,
            callbacks:{label:function(ctx){return' '+fmt(ctx.raw)+' '+baseSym();}}
          }
        },
        layout:{padding:{left:8,right:8}},
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{font:{family:'Figtree',size:10},color:textC,maxTicksLimit:12,maxRotation:45}},
          y:{grid:{color:gridC,lineWidth:.5},border:{display:false},ticks:{font:{family:'Figtree',size:10},color:textC,callback:function(v){var n=Math.abs(v);return n>=10000?Math.round(n/1000)+'k':n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':n;}}}
        },
        animation:{duration:500,easing:'easeOutQuart'}
      }
    });
  } else {
    // COMBO: gray daily bars (background context) + indigo cumulative line on top — exact mockup
    var lineColor=dark?'#818cf8':'#6366f1';
    var fillColor=dark?'rgba(129,140,248,.08)':'rgba(99,102,241,.07)';
    charts.timeline=new Chart(canvas,{
      type:'bar',
      data:{labels:labels,datasets:[
        {
          type:'bar',
          label:'Denní výdaje',
          data:dailyVals,
          backgroundColor:dark?'rgba(129,140,248,.18)':'rgba(99,102,241,.12)',
          borderRadius:3,
          borderSkipped:false,
          maxBarThickness:28,
          order:2,
          yAxisID:'y'
        },
        {
          type:'line',
          label:'Kumulativní výdaje',
          data:cumulVals,
          borderColor:lineColor,
          backgroundColor:fillColor,
          fill:true,
          tension:.4,
          // Open circles like mockup
          pointBackgroundColor:'#ffffff',
          pointBorderColor:lineColor,
          pointBorderWidth:2,
          pointRadius:dates.length>20?0:4,
          pointHoverRadius:6,
          pointHitRadius:10,
          borderWidth:2.5,
          order:1,
          yAxisID:'y'
        }
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{
            display:true,
            position:'top',
            align:'start',
            labels:{
              font:{family:'Figtree',size:11},
              boxWidth:8,boxHeight:8,
              usePointStyle:true,pointStyle:'circle',
              color:textC,padding:4,
              filter:function(item){return item.text==='Kumulativní výdaje';}
            }
          },
          tooltip:{
            backgroundColor:dark?'#1a1d33':'#ffffff',
            titleColor:dark?'#eeeeff':'#1a1f36',bodyColor:dark?textC:'#4a5068',
            borderColor:dark?'rgba(130,120,255,.2)':'rgba(0,0,0,.08)',
            borderWidth:1,padding:12,cornerRadius:10,boxPadding:4,
            callbacks:{label:function(ctx){return' '+ctx.dataset.label+': '+fmt(ctx.raw)+' '+baseSym();}}
          }
        },
        layout:{padding:{left:4,right:16,top:4,bottom:4}},
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{font:{family:'Figtree',size:10},color:textC,maxTicksLimit:8,maxRotation:0}},
          y:{
            grid:{color:gridC,lineWidth:.5},
            border:{display:false},
            ticks:{font:{family:'Figtree',size:10},color:textC,callback:function(v){
              var n=Math.abs(v);
              return n>=10000?Math.round(n/1000)+'k':n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':n;
            }}
          }
        },
        animation:{duration:500,easing:'easeOutQuart'}
      }
    });
  }
}

function buildExpItems(filtered, showDate){
  return filtered.map(function(e){
    var c=gc(e.payer);
    var baseAmt=toBase(e.amount,e.currency);
    var origStr=e.currency!==(st.baseCurrency||'CZK')?e.amount.toLocaleString('cs-CZ')+' '+e.currency:'';
    var meta=buildExpMeta(e);
    // When date is shown in group header, strip date from meta line
    if(showDate===false){
      meta=meta.replace(/<div class="exp-meta">([^<]*)·\s*/,'<div class="exp-meta">');
    }
    return '<div class="exp-item">'
      +'<div class="exp-cat-icon">'+getCategoryIcon(e.desc)+'</div>'
      +'<div class="av" style="width:32px;height:32px;font-size:10px;flex-shrink:0;border-radius:8px;background:'+c.bg+';color:'+c.txt+'">'+ini(fn(e.payer))+'</div>'
      +'<div class="exp-info">'
        +'<div class="exp-name">'+(e.desc||'(bez názvu)')+'</div>'
        +meta
        +(e.note?'<div class="exp-note">'+e.note+'</div>':'')
      +'</div>'
      +'<div class="exp-right">'
        +'<div class="exp-czk">'+fmt(baseAmt)+' '+baseSym()+'</div>'
        +(origStr?'<div class="exp-orig">'+origStr+'</div>':'')
      +'</div>'
      +'<button class="edit-btn" data-eid="'+e.id+'" onclick="openEditExpense(this.dataset.eid*1)" title="Upravit">✎</button>'
      +'<div class="del-wrap">'

        +'<div class="del-confirm" id="dc-'+e.id+'">'

function buildExpListHTML(filtered, sortBy, hasFilter, totalFiltered){
  if(!filtered.length){
    return '<div class="empty" id="exp-empty"><div class="ei">🔍</div><p>'+(hasFilter?'Žádné výdaje neodpovídají filtru.':'Žádné výdaje.')+'</p></div>';
  }
  // Date grouping only when sorting by date
  if(sortBy!=='date'){
    var hdr=hasFilter
      ?'<div class="filter-results" id="exp-list-hdr">'+filtered.length+' z '+st.expenses.length+' záznamů · '+fmtBase(totalFiltered)+'</div>'
      :'<div class="divlabel" id="exp-list-hdr">Seřazeno '+(sortBy==='amount'?'od největší částky':'abecedně podle plátce')+'</div>';
    return hdr+'<div class="exp-list" id="exp-list-inner">'+buildExpItems(filtered,true)+'</div>';
  }
  // Group by date
  var groups={};
  var order=[];
  filtered.forEach(function(e){
    var d=e.date||'';
    if(!groups[d]){groups[d]=[];order.push(d);}
    groups[d].push(e);
  });
  var html='';
  if(hasFilter){
    html+='<div class="filter-results" id="exp-list-hdr">'+filtered.length+' z '+st.expenses.length+' záznamů · '+fmtBase(totalFiltered)+'</div>';
  }
  html+='<div class="exp-list" id="exp-list-inner">';
  order.forEach(function(date){
    var dayExp=groups[date];
    var dayTotal=dayExp.reduce(function(s,e){return s+toBase(e.amount,e.currency);},0);
    html+='<div class="exp-date-sep">'
      +'<span class="exp-date-lbl">'+fmtDate(date)+'</span>'
      +'<span class="exp-date-line"></span>'
      +'<span class="exp-date-sum">'+fmt(dayTotal)+' '+baseSym()+'</span>'
    +'</div>';
    html+=buildExpItems(dayExp, false);
  });
  html+='</div>';
  return html;
}

async function aiCategorize(desc){
var spinner=document.getElementById(‘cat-ai-spinner’);
if(spinner)spinner.style.display=‘inline’;
try{
var icons=CATEGORIES.map(function(c){return c.icon+’ ‘+c.label;}).join(’, ‘);
var resp=await fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({
model:‘claude-haiku-4-5-20251001’,
max_tokens:10,
system:‘You assign expense names to categories. Reply ONLY with the single emoji icon, nothing else.’,
messages:[{role:‘user’,content:‘Expense: “’+desc+’”\nCategories: ‘+icons+’\nReply with ONLY the matching emoji, no text.’}]
})
});
if(!resp.ok)throw resp.status;
var data=await resp.json();
var icon=(data.content[0].text||’’).trim().split(’ ‘)[0];
// Validate it’s one of our icons
var valid=CATEGORIES.some(function(c){return c.icon===icon;});
if(valid){
fForm._catOverride=icon;
var preview=document.getElementById(‘cat-icon-preview’);
if(preview) preview.textContent=icon;
}
}catch(e){/* silently fail - keyword match still works */}
finally{if(spinner)spinner.style.display=‘none’;}
}

// INDEXEDDB — Receipt photo storage
var _idb=null;
function openIDB(){
return new Promise(function(res,rej){
if(_idb){res(_idb);return;}
var req=indexedDB.open(‘ferovka-receipts’,1);
req.onupgradeneeded=function(e){e.target.result.createObjectStore(‘receipts’,{keyPath:‘id’});};
req.onsuccess=function(e){_idb=e.target.result;res(_idb);};
req.onerror=function(){rej(req.error);};
});
}
async function saveReceipt(expId, dataUrl){
var db=await openIDB();
return new Promise(function(res,rej){
var tx=db.transaction(‘receipts’,‘readwrite’);
tx.objectStore(‘receipts’).put({id:String(expId),data:dataUrl});
tx.oncomplete=function(){res();};
tx.onerror=function(){rej(tx.error);};
});
}
async function getReceipt(expId){
var db=await openIDB();
return new Promise(function(res){
var req=db.transaction(‘receipts’,‘readonly’).objectStore(‘receipts’).get(String(expId));
req.onsuccess=function(){res(req.result?req.result.data:null);};
req.onerror=function(){res(null);};
});
}
async function deleteReceipt(expId){
var db=await openIDB();
return new Promise(function(res){
var tx=db.transaction(‘receipts’,‘readwrite’);
tx.objectStore(‘receipts’).delete(String(expId));
tx.oncomplete=res; tx.onerror=res;
});
}

// Resize image to max 800px and ~150KB
function resizeImage(file, callback){
var reader=new FileReader();
reader.onload=function(e){
var img=new Image();
img.onload=function(){
var max=800;
var w=img.width, h=img.height;
if(w>max){h=Math.round(h*max/w);w=max;}
if(h>max){w=Math.round(w*max/h);h=max;}
var canvas=document.createElement(‘canvas’);
canvas.width=w; canvas.height=h;
canvas.getContext(‘2d’).drawImage(img,0,0,w,h);
callback(canvas.toDataURL(‘image/jpeg’,0.75));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
}

function czToIBAN(accountStr){
if(!accountStr||!accountStr.includes(’/’))return null;
try{
const slash=accountStr.indexOf(’/’);
const bankCode=accountStr.substring(slash+1).trim().padStart(4,‘0’);
const accPart=accountStr.substring(0,slash).trim();
let prefix=‘0’,number=accPart;
if(accPart.includes(’-’)){
const dash=accPart.indexOf(’-’);
prefix=accPart.substring(0,dash);
number=accPart.substring(dash+1);
}
const prefixPad=prefix.replace(/[^0-9]/g,’’).padStart(6,‘0’);
const numberPad=number.replace(/[^0-9]/g,’’).padStart(10,‘0’);
const bban=bankCode+prefixPad+numberPad;
// CZ = C(12) Z(35)
const rearranged=bban+‘123500’;
let rem=BigInt(rearranged)%BigInt(97);
const check=(98n-rem).toString().padStart(2,‘0’);
return ‘CZ’+check+bban;
}catch(e){return null;}
}

function buildSPD(iban,amount,msg){
let s=‘SPD*1.0*ACC:’+iban+’*AM:’+amount.toFixed(2)+’*CC:CZK’;
if(msg)s+=’*MSG:’+msg.replace(/[*]/g,’’).substring(0,60);
return s;
}

.metric .ml{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#6b7280;margin-bottom:4px}
.metric .mv{font-size:22px;font-weight:700;color:#6366f1;letter-spacing:-.03em}
.metric .ms{font-size:11px;color:#9ca3af;margin-top:2px}
.fam-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f3f4f6}
.fam-av{width:36px;height:36px;border-radius:50%;background:#e0e7ff;color:#4f46e5;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fam-info{flex:1}
.fam-info strong{display:block;font-size:14px}
.fam-info span{font-size:12px;color:#6b7280}
.fam-nums{display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:12px;color:#6b7280}

.fam-card-pdf{border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:10px;break-inside:avoid;background:#fff}
.fam-card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fam-head-info{flex:1}
.fam-head-info strong{display:block;font-size:14px}
.fam-head-info span{font-size:11px;color:#6b7280}
.fam-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;white-space:nowrap}
.fam-badge.pos{background:#dcfce7;color:#166534}
.fam-badge.neg{background:#fee2e2;color:#991b1b}
.fam-badge.zero{background:#f3f4f6;color:#6b7280}
.fam-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.fam-stat{background:#f9fafb;border-radius:6px;padding:6px 10px}
.fs-label{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:2px}
.fs-val{font-size:13px;font-weight:700;color:#1a1a2e}
.fs-val.pos{color:#16a34a}
.fs-val.neg{color:#dc2626}
.fam-breakdown{border-top:1px solid #f3f4f6;padding-top:8px;margin-bottom:8px;display:flex;flex-direction:column;gap:3px}
.fam-bd-row{display:flex;align-items:center;gap:6px;font-size:11px}
.fam-bd-arrow{font-size:13px;color:#9ca3af;width:14px;text-align:center}
.fam-bd-name{flex:1;color:#374151}
.fam-bd-amt{color:#6b7280;font-weight:600}
.fam-bar-wrap{height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.fam-bar{height:100%}
.fam-bar.pos{background:#22c55e}
.fam-bar.neg{background:#ef4444}
.fam-bar.zero{background:#9ca3af}
/* Per-expense detail table inside family card */
.fam-exp-detail{margin-bottom:10px;border-top:1px solid #e5e7eb;padding-top:10px}
.fam-exp-table{width:100%;border-collapse:collapse;font-size:11px}
.fam-exp-table th{text-align:left;padding:4px 6px;background:#f8f9ff;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;border-bottom:1px solid #e5e7eb}
.fam-exp-table td{padding:5px 6px;border-bottom:1px solid #f8f9ff;vertical-align:top}
.fam-exp-table tr:last-child td{border-bottom:none}
.fam-exp-table tr:hover td{background:#fafafa}
.exp-paid-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:#e0e7ff;color:#4f46e5;margin-left:5px;vertical-align:middle}
/* -- Fix 3: Settlement rows with QR codes -- */
.settle-row{display:flex;flex-direction:column;align-items:stretch;gap:8px;padding:10px 12px;border-radius:8px;background:#f9fafb;margin-bottom:6px;font-size:13px;break-inside:avoid}
.settle-row.done{opacity:.5}
.settle-main{display:flex;align-items:center;gap:10px}
.sinfo{flex:1}
.snum{width:22px;height:22px;border-radius:50%;background:#e0e7ff;color:#4f46e5;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.samt{margin-left:auto;font-weight:700;color:#4f46e5;font-size:14px}
.sdone{color:#16a34a;font-size:16px}
.qr-cell{display:flex;align-items:center;gap:12px;padding:8px;background:#fff;border:1px dashed #e5e7eb;border-radius:6px;justify-content:center}
.qr-cell img{width:100px;height:100px;display:block}

.qr-cell.qr-empty{color:#9ca3af;font-size:11px;font-style:italic;padding:8px;justify-content:center}
.chart-block{margin-bottom:20px;break-inside:avoid}

function exportExcel(){
const wb=XLSX.utils.book_new();
const bal=calcBal();
const tr=calcSettle(bal);
const sorted=[…st.expenses].sort((a,b)=>a.date.localeCompare(b.date));
const n=sorted.length;
const nFam=st.families.length;

// – Sheet 0: Parametry –––––––––––––––––––––––
// Kurzy jsou zde – změna kurzu přepočítá celý list Výdaje
const wsP=XLSX.utils.aoa_to_sheet([
[‘Parametr’,‘Hodnota’,‘Popis’],
[‘Kurz EUR’,’’+st.rates.EUR,‘Kč za 1 EUR – změnou se přepočítají CZK sloupce ve Výdajích’],
[‘Kurz USD’,’’+st.rates.USD,‘Kč za 1 USD – změnou se přepočítají CZK sloupce ve Výdajích’],
]);
// B2, B3 jsou čísla (ne text)
wsP[‘B2’]={t:‘n’,v:st.rates.EUR,z:‘0.00’};
wsP[‘B3’]={t:‘n’,v:st.rates.USD,z:‘0.00’};
wsP[’!cols’]=[{wch:14},{wch:10},{wch:50}];
XLSX.utils.book_append_sheet(wb,wsP,‘Parametry’);

// – Sheet 1: Výdaje ———————————————––
// Col:  A         B       C           D       E               F(vzorec)   G               H         I(vzorec)  J
// Sloupec F = CZK částka: vzorec přepočítá podle kurzu z Parametry!B2/B3
// Sloupec I = Kč/os: vzorec F/H
const expHdr=[‘Datum’,‘Popis’,‘Kdo platil’,‘Původní měna’,‘Původní částka’,‘Částka (’+( st.baseCurrency||‘CZK’)+’)’,‘Účastníci (skupina: počet)’,‘Celkem osob’,(st.baseCurrency||‘CZK’)+’ / osoba’,‘Poznámka’];
const expData=[expHdr];
sorted.forEach(e=>{
const parts=Object.entries(e.participants||{}).filter(([,n])=>n>0).map(([id,cnt])=>`${fn(id)}: ${cnt}`).join(’, ‘);
expData.push([fmtDate(e.date),e.desc,fn(e.payer),e.currency,e.amount,null,parts,totalP(e),null,e.note||’’]);
});
expData.push([]);
expData.push([’’,’’,’’,’’,‘CELKEM’,null,’’,’’,’’]);

const wsE=XLSX.utils.aoa_to_sheet(expData);

// Vzorce pro CZK (F) a Kč/os (I) pro každý výdaj
for(let i=0;i<n;i++){
const r=i+2;
wsE[`F${r}`]={t:‘n’,
f:`IF(D${r}="CZK",E${r},IF(D${r}="EUR",E${r}*Parametry!$B$2,IF(D${r}="USD",E${r}*Parametry!$B$3,E${r})))`,
z:’#,##0’};
wsE[`I${r}`]={t:‘n’,f:`IF(H${r}>0,ROUND(F${r}/H${r},0),0)`,z:’#,##0’};
}
// Součtový vzorec
const eTotalRow=n+3;
wsE[`F${eTotalRow}`]={t:‘n’,f:`SUM(F2:F${n+1})`,z:’#,##0 “Kč”’};
wsE[’!cols’]=[{wch:12},{wch:28},{wch:14},{wch:7},{wch:14},{wch:14},{wch:44},{wch:10},{wch:12},{wch:28}];
XLSX.utils.book_append_sheet(wb,wsE,‘Výdaje’);

// – Sheet 2: Bilance ————————————————
// Zaplatil (C) = SUMIF přes Výdaje – živý vzorec
// Podíl (D)    = vypočtená hodnota (složitý per-osoba výpočet)
// Bilance (E)  = C - D  (vzorec)
const balHdr=[‘Skupina’,‘Počet členů’,‘Zaplatil (Kč)’,‘Jeho podíl (Kč)’,‘Bilance (Kč)’,‘Stav’];
const balData=[balHdr];
st.families.forEach(f=>{
const v=bal[f.id]||0;
const owed=st.expenses.reduce((s,e)=>{
const cnt=(e.participants||{})[f.id]||0;if(!cnt)return s;
const tot=totalP(e);return tot>0?s+(toBase(e.amount,e.currency)/tot)*cnt:s;
},0);
const stav=v>0.5?‘Dostane zpět’:v<-0.5?‘Dluží’:‘Vyrovnáno’;
balData.push([f.name,f.members,null,Math.round(owed),null,stav]);
});
balData.push([]);
balData.push([‘CELKEM’,’’,null,null,null,’’]);

const wsB=XLSX.utils.aoa_to_sheet(balData);
// Vzorce pro každou rodinu
st.families.forEach((_,i)=>{
const r=i+2;
// C = SUMIF(plátce v Výdaje = jméno skupiny, suma CZK)
var expSheet=‘Výdaje’;wsB[`C${r}`]={t:‘n’,f:`SUMIF(${expSheet}!$C:$C,A${r},${expSheet}!$F:$F)`,z:’#,##0’};
// E = zaplatil - podíl
wsB[`E${r}`]={t:‘n’,f:`C${r}-D${r}`,z:’#,##0’};
});
// Součty
const bTotalRow=nFam+3;
wsB[`C${bTotalRow}`]={t:‘n’,f:`SUM(C2:C${nFam+1})`,z:’#,##0’};
wsB[`D${bTotalRow}`]={t:‘n’,f:`SUM(D2:D${nFam+1})`,z:’#,##0’};
wsB[`E${bTotalRow}`]={t:‘n’,f:`SUM(E2:E${nFam+1})`,z:’#,##0’};
// Poznámka: E-součet by měl být 0 (kontrola)
wsB[`F${bTotalRow}`]={t:‘s’,v:‘← součet bilancí musí být 0’};
wsB[’!cols’]=[{wch:16},{wch:10},{wch:16},{wch:16},{wch:14},{wch:18}];
XLSX.utils.book_append_sheet(wb,wsB,‘Bilance’);

// – Sheet 3: Vyúčtování ———————————————
const setHdr=[’#’,‘Od koho’,‘Komu’,‘Částka (Kč)’];
const setData=[setHdr];
tr.forEach((t,i)=>setData.push([i+1,fn(t.from),fn(t.to),t.amount]));
setData.push([]);
setData.push([’’,’’,‘CELKEM’,null]);

const wsS=XLSX.utils.aoa_to_sheet(setData);
const sTotalRow=tr.length+3;
wsS[`D${sTotalRow}`]={t:‘n’,f:`SUM(D2:D${tr.length+1})`,z:’#,##0 “Kč”’};
wsS[’!cols’]=[{wch:4},{wch:16},{wch:16},{wch:14}];
XLSX.utils.book_append_sheet(wb,wsS,‘Vyúčtování’);

// – Sheet 4: Podrobnosti (per-family per-expense breakdown) ———
// Shows exactly how each family’s share was calculated
const detHdr=[‘Výdaj’,‘Datum’,‘Plátce’,‘Celkem ‘+( st.baseCurrency||‘CZK’),‘Celkem osob’];
st.families.forEach(f=>detHdr.push(f.name+’ (os.)’,f.name+’ podíl’));
const detData=[detHdr];
sorted.forEach(e=>{
var baseAmt=toBase(e.amount,e.currency);
var tot=totalP(e);
var row=[e.desc,fmtDate(e.date),fn(e.payer),Math.round(baseAmt),tot];
st.families.forEach(f=>{
var cnt=(e.participants||{})[f.id]||0;
var share=tot>0&&cnt>0?Math.round(baseAmt/tot*cnt):0;
row.push(cnt>0?cnt:0, cnt>0?share:0);
});
detData.push(row);
});
// Total row
var totRow=[‘CELKEM’,’’,’’,null,null];
st.families.forEach(f=>{
var owed=st.expenses.reduce((s,e)=>{
var cnt=(e.participants||{})[f.id]||0;if(!cnt)return s;
var tot2=totalP(e);return tot2>0?s+Math.round(toBase(e.amount,e.currency)/tot2*cnt):s;
},0);
totRow.push(’’,owed);
});
detData.push([]);
detData.push(totRow);

var wsD=XLSX.utils.aoa_to_sheet(detData);
// Sum formulas for podíl columns (every 2nd col starting at F)
st.families.forEach((_,fi)=>{
var col=String.fromCharCode(70+fi*2+1); // G, I, K…
var totalRow2=sorted.length+3;
wsD[col+totalRow2]={t:‘n’,f:‘SUM(’+col+‘2:’+col+(sorted.length+1)+’)’,z:’#,##0’};
// Also sum F column (persons)
var colF=String.fromCharCode(70+fi*2);
wsD[colF+totalRow2]={t:‘s’,v:’’};
});
// Highlight plátce columns
var wsDCols=[{wch:28},{wch:12},{wch:14},{wch:14},{wch:10}];
st.families.forEach(()=>wsDCols.push({wch:8},{wch:12}));
wsD[’!cols’]=wsDCols;
XLSX.utils.book_append_sheet(wb,wsD,‘Podrobnosti’);

const fname=(st.tripName||‘ferovka’).replace(/[^a-z0-9]/gi,’_’).toLowerCase();
XLSX.writeFile(wb,`${fname}.xlsx`);
showToast(‘Excel stažen ✓’);
}

r.readAsText(file);
}

var trips=allTrips();
trips=trips.filter(function(t){return t.id!==id;});
saveTrips(trips);
// Přepnout na jinou akci nebo vytvořit novou
if(trips.length>0){
setActiveId(trips[0].id);
st=trips[0].data||defaultState();
} else {
const newId=’trip*’+Date.now();
const fresh=defaultState();

}
render();showToast(‘Akce smazána’);

return ‘<div class="page-header">’

}

var PAL=[’#6366f1’,’#06b6d4’,’#10b981’,’#f59e0b’,’#ec4899’,’#f97316’,’#8b5cf6’,’#22c55e’];
var ICONS=[‘💸’,‘🏝’,‘🎿’,‘🍺’,‘🎓’,‘🍽’,‘🚗’,‘⛵’,‘🎉’,‘💼’];

// Chips

function normalizeIban(raw){
// Already IBAN (starts with CZ)
const clean=raw.replace(/\s/g,’’).toUpperCase();
if(clean.startsWith(‘CZ’))return clean;
// Czech account format: prefix-number/bankcode or number/bankcode
const match=clean.match(/^(?:(\d+)-)?(\d+)/(\d{4})$/);
if(match){
const prefix=(match[1]||‘0’).padStart(6,‘0’);
const number=match[2].padStart(10,‘0’);
const bankCode=match[3];
const bban=bankCode+prefix+number;
// Calculate IBAN check digits
const rearranged=bban+‘123500’; // CZ = 1235
let remainder=0;
for(let i=0;i<rearranged.length;i++){
remainder=(remainder*10+parseInt(rearranged[i]))%97;
}
const check=String(98-remainder).padStart(2,‘0’);
return’CZ’+check+bban;
}
return clean;
}

function buildSPD(iban,amount,message){
const clean=normalizeIban(iban);
const msg=message.replace(/[*]/g,’’).substring(0,60);
return’SPD*1.0*ACC:’+clean+’*AM:’+amount+’.00*CC:CZK*MSG:’+msg;
}

// Migrate from old single-trip storage
(function(){
try{
const old=localStorage.getItem(‘dluznicek4’);
if(old&&!getActiveId()){
const data=JSON.parse(old);
if(data&&data.families){
const id=‘trip_’+Date.now();
setActiveId(id);
st=data;
const trips=allTrips();
trips.unshift({id,name:data.tripName||‘Imported’,savedAt:new Date().toISOString(),expCount:(data.expenses||[]).length,data});
saveTrips(trips);
localStorage.removeItem(‘dluznicek4’);
}
}
}catch(e){}
})();
setTab(st.families.length===0?‘setup’:‘dashboard’);

function toggleSidebarCollapse(){
var sb=document.querySelector(’.sidebar’);
var main=document.getElementById(‘main’);
var btn=document.getElementById(‘sb-collapse-btn’);
if(!sb||!main) return;
var collapsed=sb.getAttribute(‘data-collapsed’)===‘1’;
if(collapsed){
// Expand
sb.setAttribute(‘data-collapsed’,‘0’);
sb.style.width=‘240px’;
sb.style.overflow=’’;
main.style.marginLeft=‘240px’;
main.style.maxWidth=‘calc(100% - 240px)’;
if(btn){btn.style.left=‘228px’;btn.textContent=’‹’;}
// Show all labels
sb.querySelectorAll(’.nav-label,.sb-brand-name,.sb-section-label,#dark-label,#sb-trip-name’).forEach(function(el){
el.style.display=’’;
});
sb.querySelectorAll(’.nav-item’).forEach(function(el){
el.style.justifyContent=’’;el.style.padding=’’;
});
} else {
// Collapse
sb.setAttribute(‘data-collapsed’,‘1’);
sb.style.width=‘64px’;
sb.style.overflow=‘hidden’;
main.style.marginLeft=‘64px’;
main.style.maxWidth=‘calc(100% - 64px)’;
if(btn){btn.style.left=‘52px’;btn.textContent=’›’;}
// Hide labels, center icons
sb.querySelectorAll(’.nav-label,.sb-brand-name,.sb-section-label,#dark-label,#sb-trip-name’).forEach(function(el){
el.style.display=‘none’;
});
sb.querySelectorAll(’.nav-item’).forEach(function(el){
el.style.justifyContent=‘center’;el.style.padding=‘10px’;
});
}
// Resize charts after transition
setTimeout(function(){
window.dispatchEvent(new Event(‘resize’));
}, 280);
}

function toggleSidebar(){
var sb=document.querySelector(’.sidebar’);
if(!sb)return;
sb.classList.toggle(‘open’);
if(sb.classList.contains(‘open’)){
setTimeout(function(){
document.addEventListener(‘click’,function closeSb(e){
if(!sb.contains(e.target)&&e.target.id!==‘mob-menu-btn’){
sb.classList.remove(‘open’);
document.removeEventListener(‘click’,closeSb);
}
});
},10);
}
}

// ── Setup page event delegation ─────────────────────────────────────
document.addEventListener(‘click’, function(e){
var t = e.target.closest(‘button’) || e.target;
var id = t.id;
if(id === ‘stp-new-trip’){ newTrip(); return; }
if(id === ‘stp-add-fam’){ openAddFamily(); return; }
if(id === ‘stp-export’){ exportJSON(); return; }
if(id === ‘stp-import-btn’){ var f=document.getElementById(‘stp-import-file’); if(f) f.click(); return; }
if(id === ‘stp-reset’){
openModal(‘Smazat akci’,
‘<div style="padding:8px 0;color:var(--text)">Opravdu chcete smazat tuto akci? Tato akce je nevratná.</div>’,
[{label:‘Smazat’,primary:true,fn:function(){ doResetCurrent(); closeModal(); }},{label:‘Zrušit’,fn:closeModal}]
);
return;
}
if(id === ‘cnb-btn’){ fetchCNBRates(); return; }
if(t.classList.contains(‘stp-switch’)){ switchTrip(t.dataset.id); return; }
if(t.classList.contains(‘stp-rename’)){ setupRenameTrip(t.dataset.id); return; }
if(t.classList.contains(‘stp-edit-fam’)){ openEditFamily(+t.dataset.idx); return; }
});

document.addEventListener(‘input’, function(e){
var t = e.target;
if(t.id === ‘stp-trip-name’){ st.tripName=t.value; save(); var el=document.getElementById(‘sb-trip-name’); if(el) el.textContent=t.value; }
if(t.id === ‘stp-eur’){ st.rates.EUR=+t.value; save(); }
if(t.id === ‘stp-usd’){ st.rates.USD=+t.value; save(); }
// Inline rename aktivní akce
if(t.classList && t.classList.contains(‘stp-rename-inline’)){
var trips=allTrips();
var trip=trips.find(function(x){return x.id===t.dataset.id;});
if(trip){ trip.name=t.value; if(trip.data) trip.data.tripName=t.value; saveTrips(trips); }
st.tripName=t.value; save();
var sb=document.getElementById(‘sb-trip-name’); if(sb) sb.textContent=t.value;
var mob=document.getElementById(‘mob-trip-name’); if(mob) mob.textContent=t.value||‘Bez názvu’;
}
});

document.addEventListener(‘change’, function(e){
var t = e.target;
if(t.id === ‘stp-import-file’) importJSON(e);
});

</script>

<script>
(function(){
  var _applied = false;
  function fixMobileSpacing(){
    if(window.innerWidth > 680) return;
    var topbar = document.getElementById('mobile-topbar');
    var spacer = document.getElementById('mob-top-spacer');
    var bnav = document.querySelector('.bottom-nav');
    var main = document.getElementById('main');
    if(!topbar) return;
    var th = topbar.getBoundingClientRect().height;
    var bh = bnav ? bnav.getBoundingClientRect().height : 83;
    if(th > 10){
      if(spacer) { spacer.style.display='block'; spacer.style.height=th+'px'; }
      if(main) main.style.paddingBottom = (bh + 16) + 'px';
      _applied = true;
    }
  }
  function tryFix(){
    fixMobileSpacing();
    if(!_applied) setTimeout(fixMobileSpacing, 300);
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(tryFix, 100); });
  } else {
    setTimeout(tryFix, 100);
  }
  window.addEventListener('resize', fixMobileSpacing);
  // Hook into navigation
  document.addEventListener('DOMContentLoaded', function(){
    if(typeof setTab === 'function'){
      var _orig = setTab;
      window.setTab = function(t){ _orig(t); setTimeout(fixMobileSpacing, 80); };
    }
  });
  } catch(e){ /* PWA not supported in this context */ }
})();
