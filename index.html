/* ═══════════════════════════════════════════════════
   FÉROVKA — DESIGN SYSTEM
   Mockup: modern fintech, clean cards, pill nav
═══════════════════════════════════════════════════ */

/* ── TOKENS ───────────────────────────────────────── */
:root {
  /* Backgrounds */
  --bg:         #F0F4FF;
  --surface:    #FFFFFF;
  --surface2:   #F7F9FF;
  --surface3:   #EEF2FF;

  /* Borders */
  --surface3:   #EAF0FB;
  --border:     #E4E9F7;
  --border2:    #C9D3EE;

  /* Text */
  --text:       #0F1628;
  --text2:      #5A6484;
  --text3:      #9AA3C2;

  /* Sidebar */
  --sb-bg:      #FFFFFF;
  --sb-border:  #E4E9F7;
  --sb-text:    #5A6484;
  --sb-active-bg: #5B7FD4;
  --sb-active-text: #FFFFFF;
  --sb-icon:    #9AA3C2;
  --sb-icon-active: #FFFFFF;

  /* Brand / Primary */
  --c1:         #5B7FD4;
  --c1h:        #4a6ec3;
  --c1b:        #EEF2FF;
  --c1t:        #3D5FAF;

  /* Semantic */
  --green:      #10b981;
  --green-bg:   #ECFDF5;
  --green-text: #065f46;
  --red:        #ef4444;
  --red-bg:     #FEF2F2;
  --red-text:   #991b1b;
  --blue:       #3b82f6;
  --blue-bg:    #EFF6FF;
  --amber:      #f59e0b;

  /* Radius & Shadow */
  --r:    16px;
  --rsm:  10px;
  --rxs:  7px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 12px 40px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(91,127,212,.15), 0 2px 8px rgba(0,0,0,.06);
}

[data-theme="dark"] {
  --bg:         #0D1117;
  --surface:    #161B27;
  --surface2:   #1C2333;
  --surface3:   #222D42;

  --surface3:   rgba(255,255,255,.07);
  --border:     rgba(255,255,255,.07);
  --border2:    rgba(255,255,255,.14);

  --text:       #E8EDF8;
  --text2:      #7888A8;
  --text3:      #3D4F70;

  --sb-bg:      #111827;
  --sb-border:  rgba(255,255,255,.06);
  --sb-text:    rgba(255,255,255,.45);
  --sb-active-bg: #5B7FD4;
  --sb-active-text: #FFFFFF;
  --sb-icon:    rgba(255,255,255,.3);
  --sb-icon-active: #FFFFFF;

  --c1:         #7B9EE8;
  --c1h:        #6B8ED8;
  --c1b:        rgba(91,127,212,.15);
  --c1t:        #A8C0F0;

  --green:      #22c55e;
  --green-bg:   rgba(34,197,94,.12);
  --green-text: #4ade80;
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --red-text:   #fca5a5;
  --blue:       #60a5fa;
  --blue-bg:    rgba(96,165,250,.12);

  --shadow-xs:  0 1px 2px rgba(0,0,0,.3);
  --shadow-sm:  0 1px 3px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
  --shadow-md:  0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:  0 8px 30px rgba(91,127,212,.2);
}

/* ── RESET & BASE ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Figtree', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background .25s, color .25s;
  overflow-x: hidden;
}

/* ── LAYOUT ───────────────────────────────────────── */
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar {
  width: 240px;
  background: var(--sb-bg);
  border-right: 1px solid var(--border);
  box-shadow: none;
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 20;
  overflow-y: auto;
  transition: background .25s, width .25s;
}
.sidebar.collapsed {
  width: 58px;
  overflow: hidden;
}
.sidebar.collapsed .nav-label { display: none; }
.sidebar.collapsed .sb-brand h1 { display: none; }
.sidebar.collapsed .sb-brand .brand-icon { margin: 0 auto; }
.sidebar.collapsed .sb-section { display: none; }
.sidebar.collapsed .sb-trip-switcher { display: none; }
.sidebar.collapsed .sb-bottom > .nav-item .nav-label { display: none; }
.sidebar.collapsed #sb-collapse-btn { right: -11px; transform: translateY(-50%) rotate(180deg); }
.sidebar.collapsed .nav-item { justify-content: center; padding: 10px 0; }
.sidebar.collapsed .nav-icon-wrap { margin: 0; }
.sidebar.collapsed ~ .main { margin-left: 58px; max-width: calc(100% - 58px); }

.sb-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--sb-border);
}
.sb-brand h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.03em;
}
.brand-icon {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sb-section {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
  padding: 16px 16px 6px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 10px;
  flex: 1;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--rxs);
  cursor: pointer;
  color: var(--sb-text);
  font-size: 13px;
  font-weight: 500;
  font-family: 'Figtree', sans-serif;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: all .15s;
  position: relative;
}
.nav-item:hover {
  background: rgba(91,127,212,.08);
  color: var(--text);
}
.nav-item:hover .nav-icon-wrap { color: var(--c1); }
.nav-item.active {
  background: var(--sb-active-bg);
  color: var(--sb-active-text);
}
.nav-item.active .nav-icon-wrap {
  color: var(--sb-icon-active);
  background: rgba(255,255,255,.2);
}
.nav-icon-wrap {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--sb-icon);
  transition: all .15s;
  background: transparent;
}
.nav-icon-wrap svg { display: block; }
.nav-label { font-size: 13px; font-weight: 500; }

.sb-bottom {
  padding: 12px 10px 16px;
  border-top: 1px solid var(--sb-border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sb-trip {
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: var(--rxs);
  border: 1px solid var(--border);
  margin-bottom: 4px;
}
.sb-trip-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 3px;
}
.sb-trip-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dark-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--rxs);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  border: none;
  background: none;
  width: 100%;
  font-family: 'Figtree', sans-serif;
  transition: all .15s;
}
.dark-toggle:hover { background: var(--surface2); color: var(--text); }
.toggle-track {
  width: 32px;
  height: 18px;
  border-radius: 9px;
  background: var(--border2);
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
[data-theme="dark"] .toggle-track { background: var(--c1); }
[data-theme="dark"] .toggle-thumb { transform: translateX(14px); }

/* ── MAIN AREA ────────────────────────────────────── */
.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: calc(100% - 240px);
  padding: 20px 24px 32px 20px;
  overflow-x: hidden;
}
.main-content { flex: 1; max-width: 1280px; overflow-x: hidden; }


/* ── PAGE HEADER ──────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 16px;
}
.page-title {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -.03em;
  color: var(--text);
  line-height: 1.2;
}
.page-sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}
.hactions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ── BUTTONS ──────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--rsm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: 'Figtree', sans-serif;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: -.01em;
}
.btn-primary {
  background: var(--c1);
  color: #fff;
  box-shadow: 0 2px 8px rgba(91,127,212,.35);
}
.btn-primary:hover { background: var(--c1h); box-shadow: 0 4px 14px rgba(91,127,212,.45); }
.btn-outline {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text2);
}
.btn-outline:hover { background: var(--surface2); color: var(--text); border-color: var(--c1); }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-danger { background: var(--red-bg); color: var(--red-text); border: 1px solid rgba(239,68,68,.2); }
.btn-danger:hover { background: #fee2e2; }
.btn-green { background: var(--green-bg); color: var(--green-text); border: 1px solid rgba(16,185,129,.2); }
.btn-green:hover { background: #d1fae5; }
[data-theme="dark"] .btn-outline { background: var(--surface2); }

/* ── CARDS ────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: none;
  border-radius: var(--r);
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}
.card:hover { box-shadow: var(--shadow-md); }
.cbody { padding: 20px 22px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); }

/* ── KPI METRICS GRID ─────────────────────────────── */
.dash-row1 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 16px;
  align-items: stretch;
  margin-bottom: 16px;
}
.dash-row2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 16px;
  align-items: stretch;
  margin-bottom: 16px;
}
@media (max-width: 1100px) {
  .dash-row1 { grid-template-columns: 1fr 1fr !important; }
}
@media (max-width: 680px) {
  .dash-row1 { grid-template-columns: 1fr !important; gap: 10px !important; }
  .dash-row2 { grid-template-columns: 1fr !important; gap: 10px !important; }
}
.mgrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
  align-items: stretch;
}
.kpi-card {
  background: var(--surface);
  border-radius: var(--r);
  padding: 12px 14px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  overflow: hidden;
  align-self: stretch;
}
.kpi-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text3);
  margin-bottom: 2px;
  white-space: nowrap;
}
.kpi-val {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -.03em;
  line-height: 1.1;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.kpi-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
}
.kpi-trend {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 5px;
  flex-wrap: wrap;
}
@media (max-width: 680px) {
  .kpi-card {
    padding: 12px !important;
    gap: 10px !important;
    flex-direction: row !important;
    align-items: center !important;
  }
  .kpi-card > div:first-child { /* ikona */
    width: 38px !important;
    height: 38px !important;
    min-width: 38px !important;
  }
  .kpi-card > div:first-child svg { width: 16px !important; height: 16px !important; }
  .kpi-val { font-size: 16px !important; }
  .kpi-label { font-size: 9px !important; }
  /* gauge karta na mobilu: skryj SVG, ukaž flat verzi */
  .gauge-desktop { display: none !important; }
  .gauge-mobile { display: block !important; }
  .gauge-mobile-icon { display: flex !important; }
  /* gauge karta jako row na mobilu */
  .gauge-kpi-card { flex-direction: row !important; align-items: center !important; justify-content: flex-start !important; gap: 10px !important; padding: 12px !important; }
  .gauge-content { align-items: flex-start !important; }
  .gauge-label { text-align: left !important; margin-bottom: 2px; }
  .kpi-sub { font-size: 10px !important; }
}
/* mgrid zůstává 4 sloupce až do mobilu */
.gauge-desktop { display: flex; flex-direction: column; align-items: center; width: 100%; }
.gauge-mobile { display: none; }
/* Desktop: gauge karta centrovana */
.gauge-kpi-card { flex-direction: column; align-items: center; justify-content: center; padding: 10px 12px; gap: 4px; }
.gauge-label { margin-bottom: 4px; }
@media (max-width: 680px) {
  .mgrid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
  .metric { padding: 14px 16px !important; gap: 12px !important; }
  .metric-icon-wrap { width: 40px !important; height: 40px !important; min-width: 40px !important; border-radius: 10px !important; }
  .mvalue { font-size: 18px !important; }
  .mlabel { font-size: 9px !important; }
}
.metric {
  background: var(--surface);
  border-radius: var(--r);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 20px;
  transition: box-shadow .2s, transform .2s;
}
.metric:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.metric-icon-wrap {
  width: 52px; height: 52px; min-width: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.metric-body { flex: 1; min-width: 0; }
.mlabel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 4px; }
.mvalue { font-size: 22px; font-weight: 700; letter-spacing: -.02em; line-height: 1.15; color: var(--text); }
.msub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.metric-trend { display: flex; align-items: center; gap: 7px; margin-top: 8px; }
.trend-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
.trend-up { background: #dcfce7; color: #15803d; }
[data-theme="dark"] .trend-up { background: rgba(34,197,94,.15); color: #4ade80; }
.trend-neu { background: var(--surface2); color: var(--text3); border: 1px solid var(--border2); }
.trend-lbl { font-size: 10px; color: var(--text3); }
.metric-ring { flex-shrink: 0; }

/* ── CHARTS ───────────────────────────────────────── */
.cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card {
  background: var(--surface);
  border: none;
  border-radius: var(--r);
  padding: 20px 22px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.chart-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -.02em;
}
.cw { position: relative; height: 220px; }
.cw-tall { position: relative; height: 260px; }
.tl-btn {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border2);
  border-radius: var(--rxs);
  cursor: pointer;
  background: transparent;
  color: var(--text2);
  font-family: 'Figtree', sans-serif;
  transition: all .15s;
}
.tl-btn.active { background: var(--c1); color: #fff; border-color: var(--c1); }
.tl-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

/* ── PAYER LEADERBOARD ────────────────────────────── */
.payer-board { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
.payer-row { display: flex; align-items: center; gap: 10px; }
.payer-rank { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
.payer-info { flex: 1; min-width: 0; }
.payer-name-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.payer-name { font-size: 13px; font-weight: 600; color: var(--text); }
.payer-amt { font-size: 13px; font-weight: 700; color: var(--text); }
.payer-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.payer-bar-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.payer-pct { font-size: 10px; color: var(--text3); margin-top: 3px; text-align: right; }

/* ── EXPENSE LIST ─────────────────────────────────── */
.exp-list { display: flex; flex-direction: column; }
.exp-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid rgba(0,0,0,.04);
  transition: background .1s;
}
.exp-item:last-child { border-bottom: none; }
.exp-item:hover { background: var(--surface2); }
.av {
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -.02em;
  font-family: 'Figtree', sans-serif;
}
.exp-info { flex: 1; min-width: 0; }
.exp-name {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.01em;
}
.exp-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.exp-note { font-size: 11px; color: var(--text3); font-style: italic; }
.exp-right { text-align: right; flex-shrink: 0; margin-right: 4px; }
.exp-czk { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
.exp-orig { font-size: 11px; color: var(--text3); }
.del-wrap { position: relative; flex-shrink: 0; }
.del-confirm {
  position: absolute;
  right: 0; top: 36px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--rsm);
  padding: 10px 12px;
  white-space: nowrap;
  z-index: 20;
  box-shadow: var(--shadow-md);
  font-size: 13px;
  display: none;
}
.del-confirm p { margin-bottom: 8px; font-size: 13px; color: var(--text); }
.del-confirm-btns { display: flex; gap: 6px; }
.del-btn {
  width: 30px; height: 30px;
  background: none;
  border: 1px solid transparent;
  border-radius: 7px;
  cursor: pointer;
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all .15s;
}
.del-btn:hover { background: var(--red-bg); border-color: rgba(239,68,68,.2); color: var(--red-text); }
.edit-btn {
  width: 30px; height: 30px;
  background: none;
  border: 1px solid transparent;
  border-radius: 7px;
  cursor: pointer;
  color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .15s;
  flex-shrink: 0;
}
.edit-btn:hover { background: var(--blue-bg); border-color: rgba(59,130,246,.2); color: var(--blue); }

/* ── EXPENSE STATS CHIPS ──────────────────────────── */
.exp-stats-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.exp-stat-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  background: var(--surface);
  border: none;
  border-radius: 100px;
  box-shadow: var(--shadow-xs);
}
.esc-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.esc-val { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }

/* ── DATE SEPARATORS IN EXPENSES ──────────────────── */
.exp-date-sep {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 22px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
}
.exp-date-lbl { font-size: 11px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.exp-date-line { flex: 1; height: 1px; background: var(--border); }
.exp-date-sum { font-size: 12px; font-weight: 700; color: var(--text2); white-space: nowrap; }
.divlabel {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--text3);
  padding: 8px 22px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

/* ── FILTER BAR ───────────────────────────────────── */
.filter-bar {
  display: flex; gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap; align-items: center;
}
.filter-bar input, .filter-bar select {
  padding: 9px 14px;
  font-size: 13px;
  border: 1.5px solid var(--border2);
  border-radius: var(--rsm);
  background: var(--surface);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  transition: border-color .15s;
}
.filter-bar input { flex: 1; min-width: 140px; }
.filter-bar input:focus, .filter-bar select:focus {
  outline: none;
  border-color: var(--c1);
  box-shadow: 0 0 0 3px rgba(91,127,212,.1);
}
.filter-clear {
  padding: 7px 12px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border2);
  border-radius: var(--rsm);
  cursor: pointer; background: transparent; color: var(--text2);
  font-family: 'Figtree', sans-serif; transition: all .15s;
}
.filter-clear:hover { background: var(--surface2); color: var(--red-text); border-color: var(--red); }
.filter-results {
  font-size: 12px; color: var(--text3);
  padding: 6px 22px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}

/* ── FAMILY CARDS ─────────────────────────────────── */
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.fam-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s, transform .2s;
}
.fam-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.fam-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.fam-name-text { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
.fam-meta { font-size: 12px; color: var(--text3); margin-top: 1px; }
.fgrid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.fam-stat { background: var(--surface2); border-radius: var(--rsm); padding: 10px 12px; border: 1px solid var(--border); }
.fsl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; color: var(--text3); margin-bottom: 4px; }
.fsv { font-size: 15px; font-weight: 700; letter-spacing: -.02em; }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 100px;
}
.bpos { background: var(--green-bg); color: var(--green-text); }
.bneg { background: var(--red-bg); color: var(--red-text); }
.bzero { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.bar { height: 4px; border-radius: 3px; background: var(--border); overflow: hidden; margin-top: 8px; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }

/* ── SETTLEMENT CARDS ─────────────────────────────── */
.settle-filters {
  display: flex; gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.sfilter {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  padding: 7px 16px;
  border-radius: 100px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Figtree', sans-serif;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap; transition: all .15s; flex-shrink: 0;
}
.sfilter:hover { border-color: var(--c1); color: var(--c1); }
.sfilter.active { background: var(--c1); color: #fff; border-color: var(--c1); box-shadow: 0 2px 8px rgba(91,127,212,.3); }
.sfilter-n {
  font-size: 10px; font-weight: 700;
  padding: 1px 7px; border-radius: 10px;
  background: var(--border); color: var(--text2);
  min-width: 20px; text-align: center;
}
.sfilter.active .sfilter-n { background: rgba(255,255,255,.25); color: #fff; }

/* Settlement cards */
.settle-cards { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; }
.sc {
  background: var(--surface);
  border: none;
  border-radius: var(--r);
  overflow: hidden;
  transition: all .2s;
  box-shadow: var(--shadow-xs);
}
.sc:hover { border-color: var(--border2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.sc.sc-done { opacity: .5; filter: grayscale(.3); transform: none !important; }
.sc-header { display: flex; align-items: center; gap: 14px; padding: 18px 20px 14px; }
.sc-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text3); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sc-transfer { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.sc-party { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.sc-av {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; flex-shrink: 0;
}
.sc-name { font-size: 11px; font-weight: 600; color: var(--text2); white-space: nowrap; max-width: 70px; text-align: center; }
.sc-arrow-wrap { flex: 1; display: flex; justify-content: center; }
.sc-amount { font-size: 20px; font-weight: 700; letter-spacing: -.02em; color: var(--text); white-space: nowrap; flex-shrink: 0; }
.sc-footer {
  display: flex; gap: 8px;
  padding: 10px 18px 16px;
  border-top: 1px solid rgba(0,0,0,.05);
}
.sc-qr-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 14px; border-radius: var(--rsm);
  border: none;
  background: var(--surface2); color: var(--text2);
  cursor: pointer; font-size: 12px; font-weight: 600;
  font-family: 'Figtree', sans-serif; transition: all .15s; flex: 1;
}
.sc-qr-btn:hover { background: var(--c1); color: #fff; border-color: var(--c1); box-shadow: 0 2px 8px rgba(91,127,212,.3); }
.sc-qr-na {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 8px 14px; border-radius: var(--rsm);
  border: 1.5px dashed var(--border); color: var(--text3);
  font-size: 11px; flex: 1; cursor: default;
}
.sc-qr-err { border-color: rgba(239,68,68,.3); color: var(--red-text); background: var(--red-bg); }
.sc-done-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 14px; border-radius: var(--rsm);
  border: none; background: var(--surface2); color: var(--text2);
  cursor: pointer; font-size: 12px; font-weight: 600;
  font-family: 'Figtree', sans-serif; transition: all .15s; flex: 1;
}
.sc-done-btn:hover:not(.sc-done-active) { background: var(--green-bg); border-color: rgba(16,185,129,.4); color: var(--green-text); }
.sc-done-active { background: var(--green-bg) !important; border-color: rgba(16,185,129,.35) !important; color: var(--green-text) !important; }
.settle-empty { padding: 3rem 1rem; text-align: center; color: var(--text2); font-size: 13px; }
.settle-empty-icon { font-size: 32px; margin-bottom: .75rem; }

/* Balance bar chart */
.bal-legend { font-size: 11px; color: var(--text2); font-weight: 400; display: flex; align-items: center; gap: 4px; }
.bal-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.bal-dot.pos { background: var(--green); }
.bal-dot.neg { background: var(--red); }
.bal-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.bal-row:last-child { border-bottom: none; }
.bal-label-col { display: flex; align-items: center; gap: 8px; width: 130px; flex-shrink: 0; }
.bal-fname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bal-viz { flex: 1; position: relative; height: 28px; display: flex; align-items: center; }
.bal-axis { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--border2); opacity: .7; }
.bal-bar { position: absolute; top: 7px; bottom: 7px; display: flex; align-items: center; border-radius: 3px; transition: width .3s; }
.bar-pos { left: 50%; background: var(--green); }
.bar-neg { right: 50%; background: var(--red); }
.bal-bar-lbl { font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; }
.bar-pos-lbl { position: absolute; left: 100%; margin-left: 6px; color: var(--green-text); }
.bar-neg-lbl { position: absolute; right: 100%; margin-right: 6px; color: var(--red-text); }
.bal-zero-lbl { position: absolute; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text3); white-space: nowrap; padding: 2px 8px; background: var(--surface); font-style: italic; }

/* ── MODAL ────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  backdrop-filter: blur(4px);
}
.overlay.hidden { display: none; }
.modal {
  background: var(--surface);
  border-radius: 20px;
  width: 100%; max-width: 520px; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  border: none;
  outline: none;
}
/* Remove all browser focus outlines */
button:focus, button:focus-visible { outline: none !important; box-shadow: none !important; }
input:focus { outline: none !important; box-shadow: none !important; border-color: var(--c1) !important; }
select:focus { outline: none !important; box-shadow: none !important; }
textarea:focus { outline: none !important; box-shadow: none !important; }
*:focus-visible { outline: none !important; }
.overlay:focus, .modal:focus { outline: none !important; }
.mhead {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
}
.mhead h2 { font-size: 16px; font-weight: 700; letter-spacing: -.025em; }
.mclose {
  width: 30px; height: 30px;
  border: 1px solid var(--border2);
  border-radius: 8px; background: none;
  cursor: pointer; color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.mclose:hover { background: var(--surface2); color: var(--text); }
.mbody { padding: 18px 22px; overflow-y: auto; flex: 1; }
.mfoot { display: flex; gap: 8px; padding: 14px 22px; border-top: 1px solid var(--border); flex-shrink: 0; }

/* ── FORM FIELDS ──────────────────────────────────── */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em;
  color: var(--text2); margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 10px 14px;
  font-size: 14px;
  border: 1.5px solid var(--border2);
  border-radius: var(--rsm);
  background: var(--surface);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--c1);
  box-shadow: 0 0 0 3px rgba(91,127,212,.12);
}
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Participant rows */
.part-summary {
  font-size: 13px; color: var(--text2);
  padding: 10px 14px; background: var(--surface2);
  border-radius: var(--rsm); margin-bottom: 10px;
  border: 1px solid var(--border);
}
.part-summary strong { color: var(--text); }
.part-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: var(--rsm); transition: all .15s;
}
.part-row.active {
  border-color: var(--border);
  background: var(--surface);
}
.part-row.inactive {
  background: var(--surface2);
  opacity: .55;
}
.part-toggle {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 6px; border: 2px solid var(--border2);
  background: none; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0; color: transparent;
}
.part-toggle.on { background: var(--c1); border-color: var(--c1); color: #fff; }
.count-btn {
  width: 26px; height: 26px;
  border: 1.5px solid var(--border2); border-radius: 7px;
  background: none; cursor: pointer; color: var(--text2);
  font-size: 16px; font-weight: 700; font-family: 'Figtree', sans-serif;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; line-height: 1;
}
.count-btn:hover:not(:disabled) { border-color: var(--c1); color: var(--c1); background: var(--c1b); }
.count-btn:disabled { opacity: .3; cursor: not-allowed; }
.count-val { min-width: 22px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text); }

.part-label { flex: 1; font-size: 13px; font-weight: 500; }
.part-ctrl { display: flex; align-items: center; gap: 7px; }
.pcbtn {
  width: 28px; height: 28px;
  border: 1.5px solid var(--border2); border-radius: 7px;
  background: none; cursor: pointer; color: var(--text2);
  font-size: 16px; font-family: 'Figtree', sans-serif;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.pcbtn:hover { border-color: var(--c1); color: var(--c1); }
.pcnum { width: 28px; text-align: center; font-size: 14px; font-weight: 700; color: var(--text); }
.pctrl-btn {
  padding: 5px 12px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border2); border-radius: 7px;
  cursor: pointer; background: var(--surface2); color: var(--text2);
  font-family: 'Figtree', sans-serif; transition: all .15s;
}
.pctrl-btn:hover { background: var(--surface3); color: var(--text); }
.amt-preview { font-size: 12px; color: var(--text2); margin-top: 5px; min-height: 16px; }

/* Split mode tabs */
.split-tabs {
  display: flex; margin-bottom: 12px;
  border: 1.5px solid var(--border2); border-radius: var(--rsm); overflow: hidden;
}
.split-tab {
  flex: 1; padding: 9px 14px; font-size: 12px; font-weight: 600;
  border: none; cursor: pointer; background: var(--surface); color: var(--text2);
  font-family: 'Figtree', sans-serif; transition: all .15s;
}
.split-tab.active { background: var(--c1); color: #fff; }
.split-tab:not(.active):hover { background: var(--surface2); }
.cs-hint { font-size: 11px; color: var(--text3); margin-bottom: 10px; line-height: 1.5; }
.cs-fam { border: 1.5px solid var(--border); border-radius: var(--rsm); margin-bottom: 8px; overflow: hidden; }
.cs-fam-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface2); }
.cs-fam-name { flex: 1; font-size: 13px; font-weight: 600; }
.cs-fam-total { font-size: 12px; font-weight: 700; color: var(--c1); }
.cs-add-btn { font-size: 11px; font-weight: 600; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; background: var(--surface); color: var(--text2); font-family: 'Figtree', sans-serif; transition: all .15s; }
.cs-add-btn:hover { background: var(--c1); color: #fff; border-color: var(--c1); }
.cs-rows { padding: 8px 12px 12px; display: flex; flex-direction: column; gap: 7px; }
.cs-row { display: flex; align-items: center; gap: 6px; }
.cs-count { width: 52px; padding: 6px 8px; font-size: 13px; text-align: center; border: 1.5px solid var(--border2); border-radius: 7px; background: var(--surface); color: var(--text); font-family: 'Figtree', sans-serif; }
.cs-x { font-size: 12px; color: var(--text3); flex-shrink: 0; }
.cs-price { width: 80px; padding: 6px 8px; font-size: 13px; border: 1.5px solid var(--border2); border-radius: 7px; background: var(--surface); color: var(--text); font-family: 'Figtree', sans-serif; }
.cs-unit { font-size: 11px; color: var(--text3); min-width: 28px; flex-shrink: 0; }
.cs-label { flex: 1; padding: 6px 10px; font-size: 12px; border: 1.5px solid var(--border2); border-radius: 7px; background: var(--surface); color: var(--text); font-family: 'Figtree', sans-serif; }
.cs-del-btn { width: 24px; height: 24px; border: none; background: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 0; flex-shrink: 0; border-radius: 5px; transition: all .15s; display: flex; align-items: center; justify-content: center; }
.cs-del-btn:hover { color: var(--red-text); background: var(--red-bg); }
.cs-ok { font-size: 12px; color: var(--green-text); font-weight: 600; }
.cs-warn { font-size: 12px; color: #d97706; font-weight: 600; }
.cs-breakdown { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── MISC ─────────────────────────────────────────── */
.rates-bar {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 16px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--rsm); font-size: 12px; color: var(--text2);
  margin-bottom: 14px;
}
.rate-item { display: flex; align-items: center; gap: 6px; }
.rate-item input { width: 64px; padding: 4px 8px; font-size: 12px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface); color: var(--text); font-family: 'Figtree', sans-serif; }

.empty { text-align: center; padding: 3rem; color: var(--text2); }
.empty .ei { font-size: 36px; margin-bottom: .75rem; }
.recent-item { display: flex; align-items: center; gap: 10px; padding: 11px 22px; border-bottom: 1px solid var(--border); transition: background .1s; }
.recent-item:last-child { border-bottom: none; }
.recent-item:hover { background: var(--surface2); }
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--text); color: var(--bg);
  padding: 11px 20px; border-radius: var(--rsm);
  font-size: 13px; font-weight: 600; z-index: 999;
  opacity: 0; transition: opacity .2s; pointer-events: none;
  box-shadow: var(--shadow-md);
}
.toast.show { opacity: 1; }
.hidden { display: none; }

/* TRIP HISTORY */
.trip-card {
  background: var(--surface);
  border: none;
  border-radius: var(--r);
  padding: 16px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-sm); cursor: pointer;
  transition: all .2s;
}
.trip-card:hover { border-color: var(--c1); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.trip-card.active-trip { border-color: var(--c1); border-width: 2px; background: var(--c1b); }
.trip-icon { width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.trip-info { flex: 1; min-width: 0; }
.trip-name { font-size: 15px; font-weight: 700; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trip-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
.trip-actions { display: flex; gap: 6px; flex-shrink: 0; }
.trip-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; background: var(--c1); color: #fff; flex-shrink: 0; }

/* ── MOBILE TOPBAR & FAB ──────────────────────────── */
.mobile-topbar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  z-index: 30;
  background: var(--sb-bg);
  border-bottom: 1px solid var(--sb-border);
  padding: 0 16px;
  align-items: center; justify-content: space-between;
}
.mob-logo { display: flex; align-items: center; gap: 8px; color: var(--text); font-weight: 700; font-size: 15px; letter-spacing: -.02em; }
.mob-logo-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--surface2); }
.mob-logo-icon svg { display: block; }
.mob-btn {
  width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--border2);
  cursor: pointer; background: var(--surface2); color: var(--text2);
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; transition: all .15s;
}
.mob-btn:hover { background: var(--surface3); }

/* Bottom Nav */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 40;
  padding: 10px 16px calc(14px + env(safe-area-inset-bottom, 0px));
  background: none;
}
.bottom-nav-inner {
  display: flex;
  gap: 0;
  padding: 10px 8px;
  background: linear-gradient(135deg, #5b7cfa 0%, #7c5bf5 100%);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border-radius: 28px;
  border: none;

.v-exp-name { font-size:13px; font-weight:600; line-height:1.2; }
.v-exp-meta { font-size:11px; color:var(--text3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.v-exp-amt { font-size:14px; font-weight:800; letter-spacing:-.02em; flex-shrink:0; }
.v-exp-actions { display:flex; gap:4px; flex-shrink:0; opacity:0; transition:.15s; }
.v-exp-row:hover .v-exp-actions { opacity:1; }
.v-exp-edit { padding:5px 8px; border-radius:7px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:12px; }
.v-exp-edit:hover { background:var(--surface2); }

/* Bottom stats bar */
.vstats-bar, .v-stats-bar { display:grid; grid-template-columns:repeat(4,1fr); background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-sm); overflow:hidden; margin-top:16px; }
.v-stat { display:flex; align-items:center; gap:12px; padding:16px 18px; border-right:1px solid var(--border); }
.v-stat:last-child { border-right:none; }
.v-stat-icon { width:36px; height:36px; min-width:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.v-stat-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text3); margin-bottom:2px; }
.v-stat-val { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-.02em; }
.v-stat-sub { font-size:10px; color:var(--text3); margin-top:1px; }

/* Skupiny */
.sk-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.sk-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-sm); padding:20px; display:flex; flex-direction:column; gap:14px; cursor:pointer; transition:box-shadow .2s, transform .2s; }
.sk-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.sk-card-head { display:flex; align-items:center; gap:12px; }
.sk-card-icon { width:44px; height:44px; min-width:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.sk-card-name { font-size:15px; font-weight:700; letter-spacing:-.02em; line-height:1.2; }
.sk-card-members { font-size:11px; color:var(--text3); margin-top:2px; display:flex; align-items:center; gap:4px; }
.sk-badge-active { font-size:10px; font-weight:700; padding:2px 8px; border-radius:100px; background:#dcfce7; color:#15803d; margin-left:auto; flex-shrink:0; }
.sk-badge-inactive { font-size:10px; font-weight:700; padding:2px 8px; border-radius:100px; background:var(--surface2); color:var(--text3); border:1px solid var(--border2); margin-left:auto; flex-shrink:0; }
[data-theme="dark"] .sk-badge-active { background:rgba(34,197,94,.15); color:#4ade80; }
.sk-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.sk-stat { display:flex; flex-direction:column; }
.sk-stat-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:3px; }
.sk-stat-val { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-.02em; }
.sk-stat-val.red { color:var(--red); }
.sk-stat-val.green { color:var(--green); }
.sk-progress { height:5px; border-radius:5px; background:var(--surface2); overflow:hidden; margin-top:2px; }
.sk-progress-fill { height:100%; border-radius:5px; transition:width .4s; }
.sk-pct { font-size:10px; color:var(--text3); text-align:right; margin-top:3px; }
.sk-card-btn { width:100%; padding:9px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--c1); font-size:12px; font-weight:600; cursor:pointer; font-family:'Figtree',sans-serif; transition:.15s; }
.sk-card-btn:hover { background:var(--c1b); }
.sk-cta { background:var(--surface2); border-radius:var(--r); padding:20px 24px; display:flex; align-items:center; justify-content:space-between; border:2px dashed var(--border2); }

/* Vyúčtování redesign */
.z-summary { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-sm); padding:22px; margin-bottom:16px; }
.z-summary-grid { display:grid; grid-template-columns:160px 1fr 180px; gap:24px; align-items:start; }
.z-bal-row { display:flex; align-items:center; gap:10px; padding:7px 0; }
.z-bal-name { font-size:13px; font-weight:600; min-width:100px; }
.z-bal-bar-wrap { flex:1; height:8px; border-radius:4px; background:var(--surface2); overflow:visible; position:relative; }
.z-bal-bar-pos { height:8px; border-radius:4px; background:#22c55e; }
.z-bal-bar-neg { height:8px; border-radius:4px; background:#ef4444; }
.z-bal-amt { font-size:12px; font-weight:700; min-width:80px; text-align:right; }
.z-bal-amt.pos { color:#16a34a; }
.z-bal-amt.neg { color:#dc2626; }
[data-theme="dark"] .z-bal-amt.pos { color:#4ade80; }
[data-theme="dark"] .z-bal-amt.neg { color:#f87171; }
.z-summary-right { background:var(--surface2); border-radius:10px; padding:14px; border:1px solid var(--border); }
.z-tabs { display:flex; gap:6px; margin-bottom:14px; align-items:center; }
.z-tab { padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'Figtree',sans-serif; background:var(--surface2); color:var(--text3); display:flex; align-items:center; gap:6px; transition:.15s; }
.z-tab.active { background:var(--c1); color:#fff; }
.z-tab-n { font-size:11px; font-weight:700; padding:1px 6px; border-radius:100px; background:rgba(255,255,255,.25); }
.z-tab:not(.active) .z-tab-n { background:var(--border2); color:var(--text3); }
.z-sort { margin-left:auto; font-size:11px; color:var(--text3); }
.z-transfer { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:var(--surface); margin-bottom:8px; transition:background .15s; }
.z-transfer:hover { background:var(--surface2); }
.z-t-num { width:24px; height:24px; min-width:24px; border-radius:50%; background:var(--c1); color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.z-t-from { display:flex; flex-direction:column; align-items:flex-start; min-width:100px; }
.z-t-name { font-size:13px; font-weight:600; }
.z-t-sub { font-size:11px; color:var(--text3); }
.z-t-arrow { font-size:18px; color:var(--text3); flex-shrink:0; }
.z-t-amt { font-size:16px; font-weight:700; color:var(--text); letter-spacing:-.02em; min-width:80px; text-align:center; flex-shrink:0; }
.z-t-to { display:flex; flex-direction:column; align-items:flex-start; flex:1; min-width:100px; }
.z-t-actions { display:flex; gap:6px; flex-shrink:0; margin-left:auto; }
.z-t-done { text-decoration:line-through; opacity:.5; }

/* Historie */
.h-group-strip { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.h-group-strip::-webkit-scrollbar { display:none; }
.h-group-chip { display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:12px; padding:10px 14px; border:2px solid var(--border); cursor:pointer; flex-shrink:0; white-space:nowrap; transition:.15s; min-width:120px; }
.h-group-chip.active { border-color:var(--c1); background:var(--c1b); }
.h-group-chip-name { font-size:13px; font-weight:700; }
.h-group-chip-meta { font-size:11px; color:var(--text3); }
.h-log-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); transition:background .12s; }
.h-log-row:last-child { border-bottom:none; }
.h-log-row:hover { background:var(--surface2); border-radius:8px; }
.h-log-icon { width:36px; height:36px; min-width:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.h-log-title { font-size:13px; font-weight:600; }
.h-log-meta { font-size:11px; color:var(--text3); margin-top:2px; }
.h-log-badge { font-size:10px; font-weight:700; padding:3px 10px; border-radius:100px; flex-shrink:0; margin-left:auto; }
.h-badge-vydaj { background:#EFF6FF; color:#1D4ED8; }
.h-badge-skupina { background:#F0FDF4; color:#15803D; }
.h-badge-uprava { background:#FFFBEB; color:#92400E; }
.h-badge-smazani { background:#FEF2F2; color:#991B1B; }
.h-badge-zuctovani { background:#F5F3FF; color:#6D28D9; }
.h-badge-clen { background:#FFF7ED; color:#C2410C; }
[data-theme="dark"] .h-badge-vydaj { background:rgba(96,165,250,.15); color:#60a5fa; }
[data-theme="dark"] .h-badge-skupina { background:rgba(34,197,94,.12); color:#4ade80; }
[data-theme="dark"] .h-badge-uprava { background:rgba(251,191,36,.12); color:#fbbf24; }
[data-theme="dark"] .h-badge-smazani { background:rgba(248,113,113,.12); color:#f87171; }
[data-theme="dark"] .h-badge-zuctovani { background:rgba(167,139,250,.12); color:#a78bfa; }
[data-theme="dark"] .h-badge-clen { background:rgba(251,146,60,.12); color:#fb923c; }

/* Nastavení */
.ns-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow-sm); padding:22px; margin-bottom:16px; }
.ns-section-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:12px; }
.ns-fam-row { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); }
.ns-fam-row:last-child { border-bottom:none; }
.ns-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; background:var(--surface); color:var(--text); font-family:'Figtree',sans-serif; transition:border-color .15s; }
.ns-input:focus { outline:none; border-color:var(--c1); }

@media (max-width:900px) {
  .sk-grid { grid-template-columns:1fr 1fr; }
  .v-kpi-grid { grid-template-columns:1fr 1fr; }
  .v-stats-bar { grid-template-columns:1fr 1fr; }
  .z-summary-grid { grid-template-columns:1fr; }
}
@media (max-width:600px) {
  .sk-grid { grid-template-columns:1fr; }
}


/* ════════════════════════════════════════════════════
   REDESIGN v2 — Mobile-first, clean & modern
════════════════════════════════════════════════════ */

/* ── Google Font upgrade ─────────────────────────── */
/* @import removed - font loaded via <link> tag */

:root {
  --font: 'Figtree', sans-serif; /* was DM Sans */
  --font-x: 'Figtree', sans-serif;
  --bg:       #f2f4f9;
  --surface:  #ffffff;
  --surface2: #f2f4f9;
  --border:   #e6e9f4;
  --border2:  #d0d5e8;
  --text:     #1a1f36;
  --text2:    #4a5068;
  --text3:    #8891aa;
  --c1:       #5b7cfa;
  --c1b:      rgba(91,124,250,.1);
  --c1t:      #ffffff;
  --green:    #22c55e;
  --green-bg: #dcfce7;
  --green-text: #15803d;
  --red:      #ef4444;
  --red-bg:   #fee2e2;
  --red-text: #991b1b;
  --r:        20px;
  --rsm:      14px;
  --shadow-sm: 0 2px 10px rgba(90,100,180,.07);
  --shadow-md: 0 4px 20px rgba(90,100,180,.12);
  --shadow-lg: 0 8px 32px rgba(90,100,180,.16);
}

[data-theme="dark"] {
  --bg:       #0f1120;
  --surface:  #1a1d2e;
  --surface2: #222538;
  --border:   rgba(255,255,255,.08);
  --border2:  rgba(255,255,255,.12);
  --text:     #eef0fb;
  --text2:    #a0a8c8;
  --text3:    #6068a8;
  --c1:       #818cf8;
  --c1b:      rgba(129,140,248,.12);
  --green-bg: rgba(34,197,94,.12);
  --green-text: #4ade80;
  --red-bg:   rgba(239,68,68,.12);
  --red-text: #f87171;
  --shadow-sm: 0 2px 10px rgba(0,0,0,.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,.4);
}

* { font-family: var(--font) !important; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

/* ── Layout ────────────────────────────────────────── */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 20px rgba(90,100,180,.06);
}

.main-content {
  flex: 1;
  max-width: 1280px;
  padding: 24px 28px 40px 32px;
  overflow-x: hidden;
}

/* ── Cards ─────────────────────────────────────────── */
.card, .chart-card {
  background: var(--surface);
  border-radius: var(--r) !important;
  box-shadow: var(--shadow-sm) !important;
  border: none !important;
}

/* ── Buttons ────────────────────────────────────────── */
.btn-primary {
  background: var(--c1) !important;
  border-radius: 12px !important;
  font-weight: 700 !important;
  box-shadow: 0 4px 14px rgba(91,124,250,.35) !important;
}
.btn-outline {
  border-radius: 12px !important;
  border: 1.5px solid var(--border2) !important;
  font-weight: 600 !important;
}
.btn:focus { outline: none !important; box-shadow: none !important; }

/* ── Nav sidebar ───────────────────────────────────── */
.nav-item {
  border-radius: 12px !important;
  font-weight: 500;
  color: var(--text2);
}
.nav-item:hover { background: var(--c1b) !important; color: var(--c1) !important; }
.nav-item.active {
  background: var(--c1) !important;
  color: white !important;
  box-shadow: 0 4px 14px rgba(91,124,250,.3) !important;
}
.nav-item.active .nav-icon-wrap { background: rgba(255,255,255,.2) !important; }

/* ── Mobile topbar ─────────────────────────────────── */
.mobile-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 10px rgba(90,100,180,.06);
}

/* ── DARK BOTTOM NAV ── odstraněno, nahrazeno novým stylem výše */


/* ── FAB ───────────────────────────────────────────── */
.fab {
  width: 52px !important;
  height: 52px !important;
  border-radius: 50% !important;
  background: var(--c1) !important;
  box-shadow: 0 4px 18px rgba(91,124,250,.45) !important;
  font-size: 26px !important;
  bottom: 148px !important;
  right: 16px !important;
}

/* ── KPI tiles ─────────────────────────────────────── */
.metric {
  background: var(--surface) !important;
  border-radius: var(--r) !important;
  box-shadow: var(--shadow-sm) !important;
  border: none !important;
  padding: 18px 16px !important;
  gap: 12px !important;
}
.metric:hover { transform: translateY(-2px) !important; box-shadow: var(--shadow-md) !important; }
.metric-icon-wrap { border-radius: 14px !important; }
.mvalue { letter-spacing: -.04em !important; }

/* ── Expense list ──────────────────────────────────── */
#exp-card-wrap { border-radius: var(--r) !important; }
#exp-card-wrap > div[style*="cursor:pointer"] {
  border-radius: 14px !important;
  transition: background .12s !important;
}

/* ── Modals ────────────────────────────────────────── */
.modal {
  border-radius: 24px !important;
  box-shadow: 0 24px 60px rgba(0,0,0,.2) !important;
  border: none !important;
}
.mhead {
  padding: 20px 22px 16px !important;
  border-bottom: 1px solid var(--border) !important;
}

/* ── Form fields ───────────────────────────────────── */
.field input, .field select, .field textarea,
input[type="text"], input[type="number"], input[type="date"], select {
  border-radius: 12px !important;
  border: 1.5px solid var(--border) !important;
  background: var(--surface) !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
  padding: 12px 14px !important;
  font-size: 14px !important;
  transition: border-color .15s !important;
}
.field input:focus, .field select:focus, input:focus, select:focus {
  border-color: var(--c1) !important;
  outline: none !important;
}

/* ── Participant rows ──────────────────────────────── */
.part-row {
  border-radius: 14px !important;
  border: 1.5px solid var(--border) !important;
  background: var(--surface) !important;
  box-shadow: 0 2px 8px rgba(90,100,180,.04) !important;
}
.part-row.active { border-color: var(--border) !important; }
.part-toggle.on { background: var(--c1) !important; border-color: var(--c1) !important; border-radius: 7px !important; }
.part-toggle { border-radius: 7px !important; }
.count-btn { border-radius: 9px !important; }
.count-btn:hover:not(:disabled) { border-color: var(--c1) !important; color: var(--c1) !important; background: var(--c1b) !important; }

/* ── Page headers ──────────────────────────────────── */
.page-title { letter-spacing: -.02em !important; font-weight: 700 !important; }
.page-sub { color: var(--text3) !important; }

/* ── Transfer rows in vyúčtování ──────────────────── */
#settle-list > div {
  border-radius: 14px !important;
  box-shadow: var(--shadow-sm) !important;
  border: 1px solid var(--border) !important;
}

/* ── Skupiny cards ─────────────────────────────────── */
.sk-card {
  border-radius: var(--r) !important;
  box-shadow: var(--shadow-sm) !important;
  border: none !important;
}
.sk-card:hover { box-shadow: var(--shadow-md) !important; transform: translateY(-2px) !important; }

/* ── Date header in expense list ───────────────────── */
.v-date-hdr {
  background: var(--surface2) !important;
  border-radius: 10px !important;
  font-weight: 700 !important;
  color: var(--text3) !important;
}

/* ── Scrollbar cleanup ─────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ════════════════════════════════════════════════════
   MOBILE OVERRIDES
════════════════════════════════════════════════════ */
@media (max-width: 680px) {
  .main { margin-left: 0 !important; max-width: 100% !important; overflow-x: hidden !important; width: 100% !important; }
  body { overflow-x: hidden !important; max-width: 100vw !important; }
  .layout { overflow-x: hidden !important; max-width: 100vw !important; }
  .main-content { padding: 12px 12px 100px !important; }

  /* KPI 2x2 */
  .mgrid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
  .metric { padding: 14px 12px !important; gap: 10px !important; }
  .metric-icon-wrap { width: 38px !important; height: 38px !important; min-width: 38px !important; }
  .mvalue { font-size: 17px !important; }
  .mlabel { font-size: 9px !important; }
  .metric-trend { margin-top: 5px !important; }

  /* Rows stack */
  .d-row2 { grid-template-columns: 1fr !important; }
  .d-row3 { grid-template-columns: 1fr !important; }

  /* Stats 2x2 */
  .d-stats { grid-template-columns: 1fr 1fr !important; overflow: hidden !important; }
  .d-stat { border-right: none !important; border-bottom: 1px solid var(--border) !important; padding: 12px !important; }
  .d-stat-icon { width: 32px !important; height: 32px !important; min-width: 32px !important; }
  .d-stat-val { font-size: 12px !important; }
  .d-stat-lbl { font-size: 9px !important; }

  /* Výdaje KPIs */
  .v-kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
  .v-kpi { padding: 12px 10px !important; gap: 8px !important; }
  .v-kpi-icon { width: 36px !important; height: 36px !important; min-width: 36px !important; }
  .v-stats-bar { grid-template-columns: 1fr 1fr !important; }
  .v-stat { border-right: none !important; border-bottom: 1px solid var(--border) !important; }

  /* Skupiny 1 col */
  .sk-grid { grid-template-columns: 1fr !important; }

  /* Page header wrap */
  .page-header { flex-wrap: wrap !important; gap: 8px !important; }
  .hactions { flex-wrap: wrap !important; gap: 6px !important; }
  .hactions .btn { font-size: 12px !important; padding: 8px 10px !important; }

  /* Charts */
  .cw-tall { height: 200px !important; }
  .cw { height: 160px !important; }

  /* Modal full-screen on mobile */
  .overlay { align-items: flex-end !important; padding: 0 !important; }
  .modal {
    border-radius: 24px 24px 0 0 !important;
    max-width: 100% !important;
    width: 100% !important;
    max-height: 92vh !important;
  }
}

/* ── Calendar popup ────────────────────────────────── */
.cal-popup {
  display: none;
  background: var(--surface);
  border-radius: 16px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-md);
  padding: 14px;
  margin-top: 8px;
  animation: fadeIn .15s ease;
}
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-month { font-size: 14px; font-weight: 700; color: var(--text); }
.cal-nav {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text2); font-family: var(--font);
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-day-lbl { text-align: center; font-size: 9px; font-weight: 700; color: var(--text3); padding: 4px 0; }
.cal-day {
  text-align: center; padding: 7px 2px; font-size: 13px;
  font-weight: 500; color: var(--text); border-radius: 8px; cursor: pointer;
  transition: background .12s;
}
.cal-day:hover { background: var(--c1b); }
.cal-day.cal-selected { background: var(--c1); color: white; font-weight: 700; }
.cal-day.cal-today { color: var(--c1); font-weight: 700; }
.cal-day.cal-other { color: var(--text3); opacity: .5; }

/* ── Numpad ─────────────────────────────────────────── */
.numpad-wrap {
  background: var(--surface2);
  border-radius: 16px;
  padding: 12px;
  margin-top: 4px;
}
.numpad-display-wrap {
  background: var(--surface);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.numpad-display {
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.04em;
  line-height: 1;
}
.numpad-cursor {
  display: inline-block; width: 2px; height: 36px;
  background: var(--c1); border-radius: 2px; margin-left: 3px;
  animation: blink 1s step-end infinite; vertical-align: bottom;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.numpad-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.numkey {
  background: var(--surface);
  border-radius: 12px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 600; color: var(--text);
  box-shadow: 0 2px 6px rgba(0,0,0,.06); cursor: pointer;
  border: none; font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  transition: transform .1s, opacity .1s;
}
.numkey:active { transform: scale(.94); opacity: .8; }
.numkey.numkey-action { background: var(--c1); color: white; font-size: 16px; font-weight: 700; }
.numkey.numkey-del { background: var(--surface2); color: var(--text2); }
.numkey.numkey-zero { grid-column: span 1; }

/* ── Receipt upload ─────────────────────────────────── */
.receipt-section { margin-top: 4px; }
.receipt-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 11px 14px;
  background: var(--surface2); border: 1.5px dashed var(--border2);

  font-size: 13px; font-weight: 600; color: var(--text2);
  transition: all .15s;
}
.receipt-btn:hover { border-color: var(--c1); color: var(--c1); background: var(--c1b); }
.receipt-preview { border-radius: 12px; overflow: hidden; position: relative; }

/* ── Date field clickable ───────────────────────────── */
.date-field-btn {

  width: 100%; padding: 12px 14px;
  background: var(--surface); border: 1.5px solid var(--border);

  transition: border-color .15s;
}
.date-field-btn:hover { border-color: var(--c1); }

<script>
// Fix top padding after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  function applyTopPad() {
    if (window.innerWidth > 680) return;
    var topbar = document.getElementById('mobile-topbar');
    var layout = document.querySelector('.layout');
    if (!topbar || !layout) { setTimeout(applyTopPad, 100); return; }
    var rect = topbar.getBoundingClientRect();
    if (rect.bottom > 10) {
      layout.style.paddingTop = rect.bottom + 'px';
    } else {
      setTimeout(applyTopPad, 150);
    }
  }
  applyTopPad();
  setTimeout(applyTopPad, 300);
  window.addEventListener('resize', applyTopPad);
});
</script>

<script>

  d.textContent += (e.message||'?')+' | src:'+(e.filename||'?')+'|L:'+(e.lineno||0)+':'+( e.colno||0)+' | ';

  if(!e.filename || e.filename === '') { e.preventDefault(); return true; }
});
window.addEventListener('unhandledrejection', function(e){
  var d=document.getElementById('err-box');
  if(d){d.style.display='block';d.textContent+='PROMISE: '+(e.reason||'?')+' | ';}
  e.preventDefault();
});
</script>

<script>

// -- COLORS -----------------------------------------------------------

  {bg:'#3b1c0e',txt:'#fb923c',dot:'#F97316'},

];

function gc(id){
  const i=st.families.findIndex(f=>f.id===id);
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  return (dark?COLS_DARK:COLS)[i%COLS.length];
}

// -- STATE ------------------------------------------------------------
function defaultState(){
  return{tripName:'',families:[],expenses:[],rates:{EUR:25.0,USD:22.4},baseCurrency:'CZK',done:{},nextId:1,filter:{q:'',payer:'',sortBy:'date'}};
}

// Ensure per-trip rates exist (migration)
function ensureRates(){
  if(!st.rates)st.rates={EUR:25.0,USD:22.4};
  if(!st.rates.EUR)st.rates.EUR=25.0;
  if(!st.rates.USD)st.rates.USD=22.4;
}
var st=loadSt();
var charts={};
var currentTab='';
var currentSettleFilter='pending'; // 'pending' | 'done' | 'all'

// Multi-trip storage
// dluznicek_trips: [{id, name, savedAt, expenses.length snapshot, data}]
// dluznicek_active: current trip id

function allTrips(){
  try{return JSON.parse(localStorage.getItem('dluznicek_trips')||'[]');}catch(e){return[];}
}
function saveTrips(trips){try{localStorage.setItem('dluznicek_trips',JSON.stringify(trips));}catch(e){}}
function getActiveId(){return localStorage.getItem('dluznicek_active')||null;}
function setActiveId(id){localStorage.setItem('dluznicek_active',id);}

function loadSt(){
  const id=getActiveId();
  if(id){
    const trips=allTrips();
    const trip=trips.find(t=>t.id===id);
    if(trip&&trip.data)return trip.data;
  }
  // no active trip -- return fresh state
  return defaultState();
}

function save(){
  const id=getActiveId();
  if(!id){
    // create new trip entry
    const newId='trip_'+Date.now();
    setActiveId(newId);
    const trips=allTrips();
    trips.unshift({id:newId,name:st.tripName||'Bez názvu',savedAt:new Date().toISOString(),expCount:st.expenses.length,data:st});
    saveTrips(trips);
    return;
  }
  const trips=allTrips();
  const idx=trips.findIndex(t=>t.id===id);
  const entry={id,name:st.tripName||'Bez názvu',savedAt:new Date().toISOString(),expCount:st.expenses.length,data:st};
  if(idx>=0)trips[idx]=entry;else trips.unshift(entry);
  saveTrips(trips);
}

// Cleanup duplicate empty trips on start

function fn(id){const f=st.families.find(x=>x.id===id);return f?f.name:id;}
function ini(n){return(n||'?').slice(0,2).toUpperCase();}
function toCzk(amt,cur){if(cur==='CZK')return amt;return amt*(st.rates[cur]||1);}
function toBase(amt,cur){
  // Convert amt in 'cur' to st.baseCurrency
  var base=st.baseCurrency||'CZK';
  if(cur===base)return amt;
  // first to CZK, then to base
  var czk=toCzk(amt,cur);
  if(base==='CZK')return czk;
  return czk/(st.rates[base]||1);
}
function fmtBase(n){
  var base=st.baseCurrency||'CZK';
  var abs=Math.round(Math.abs(n));
  if(base==='CZK')return abs.toLocaleString('cs-CZ')+' Kč';
  if(base==='EUR')return abs.toLocaleString('cs-CZ')+' €';
  if(base==='USD')return abs.toLocaleString('cs-CZ')+' $';
  return abs.toLocaleString('cs-CZ')+' '+base;
}
function baseSym(){
  var b=st.baseCurrency||'CZK';
  return b==='CZK'?'Kč':b==='EUR'?'€':b==='USD'?'$':b;
}
function fmt(n){return Math.round(Math.abs(n)).toLocaleString('cs-CZ');}
function fmtCzk(n){return fmt(n)+' Kč';}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}

function buildExpMeta(e){
  // Returns the meta line and optional breakdown line for an expense
  var base=fmtDate(e.date)+' · '+fn(e.payer);
  if(e.splitMode==='custom'&&e.customSplit){
    var breakdown=Object.entries(e.customSplit).map(function(entry){
      var fid=entry[0],rows=entry[1];
      var parts=rows.filter(function(r){return (r.count||0)>0;});
      if(!parts.length)return null;
      var fName=fn(fid);
      var rowStrs=parts.map(function(r){return (r.count||0)+'× '+(r.label||'osoba')+' à '+fmt(r.price||0);}).join(', ');
      return fName+': '+rowStrs;
    }).filter(Boolean).join(' | ');
    return '<div class="exp-meta">'+base+' · <span style="color:var(--c1);font-weight:500">vlastní sazby</span></div>'
      +(breakdown?'<div class="cs-breakdown">'+breakdown+'</div>':'');
  }
  var total=totalP(e);
  var parts=Object.entries(e.participants||{}).filter(function(x){return x[1]>0;}).length;
  var baseAmt=toBase(e.amount,e.currency);
  var ppStr=total>0?fmt(baseAmt/total)+' '+baseSym()+'/os':'';
  return '<div class="exp-meta">'+base+' · '+parts+' rodin · '+total+' osob'+(ppStr?' · '+ppStr:'')+'</div>';
}
function today(){return new Date().toISOString().slice(0,10);}
function totalP(e){
  if(e.splitMode==='custom'){
    // total weighted persons = sum(count) across all families' rows
    if(!e.customSplit)return 0;
    return Object.values(e.customSplit).reduce(function(s,rows){
      return s+rows.reduce(function(rs,r){return rs+(r.count||0);},0);
    },0);
  }
  return Object.values(e.participants||{}).reduce((s,n)=>s+n,0);
}

function calcBal(){
  var bal={};
  st.families.forEach(function(f){bal[f.id]=0;});
  st.expenses.forEach(function(e){
    var baseAmt=toBase(e.amount,e.currency);
    bal[e.payer]=(bal[e.payer]||0)+baseAmt;

    if(e.splitMode==='custom'&&e.customSplit){
      // Each family's share = sum(count × price) for their rows, converted to base currency
      Object.entries(e.customSplit).forEach(function(entry){
        var fid=entry[0],rows=entry[1];
        var famShare=rows.reduce(function(s,r){return s+(r.count||0)*(r.price||0);},0);
        // customSplit prices are always in e.currency
        var famShareBase=toBase(famShare,e.currency);
        if(famShareBase>0)bal[fid]=(bal[fid]||0)-famShareBase;
      });
    } else {
      // Standard equal-per-person split
      var total=totalP(e);if(!total)return;
      var pp=baseAmt/total;
      Object.entries(e.participants||{}).forEach(function(entry){
        var pid=entry[0],cnt=entry[1];
        if(cnt>0)bal[pid]=(bal[pid]||0)-pp*cnt;
      });
    }
  });
  return bal;
}

function calcSettle(bal){
  const d=[],c=[];
  Object.entries(bal).forEach(([id,v])=>{
    if(v<-0.5)d.push({id,a:-v});else if(v>0.5)c.push({id,a:v});
  });
  d.sort((a,b)=>b.a-a.a);c.sort((a,b)=>b.a-a.a);
  const tr=[];let i=0,j=0;
  while(i<d.length&&j<c.length){
    const dd=d[i],cc=c[j],amt=Math.min(dd.a,cc.a);
    if(amt>0.5)tr.push({from:dd.id,to:cc.id,amount:Math.round(amt)});
    dd.a-=amt;cc.a-=amt;
    if(dd.a<0.5)i++;if(cc.a<0.5)j++;
  }
  return tr;
}

// weighted per-person: total / weighted-average-participants-per-czk
function calcPerPerson(){
  const totalCzk=st.expenses.reduce(function(s,e){return s+toBase(e.amount,e.currency);},0);
  if(!totalCzk||!st.expenses.length)return 0;
  // weighted average of actual participants, weighted by expense amount
  const weightedPart=st.expenses.reduce((s,e)=>s+(toBase(e.amount,e.currency)/Math.max(totalCzk,1))*totalP(e),0);
  return weightedPart>0?Math.round(totalCzk/weightedPart):0;
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){
    // Create the toast element on the fly if it doesn't exist in the DOM.
    // Without this guard, an early call to showToast throws a null-ref error
    // that aborts submitExpense() mid-flight, leaving the bubble chart stale.
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1b2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-family:Figtree,sans-serif;z-index:200;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2)';
    document.body.appendChild(t);
    // Tiny style rule for .show class
    if(!document.getElementById('toast-style')){
      var s=document.createElement('style');
      s.id='toast-style';
      s.textContent='#toast.show{opacity:.95 !important}';
      document.head.appendChild(s);
    }
  }
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

      +'</div>'

      +'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;font-weight:600;flex:1">EUR</span><input id="stp-eur" type="number" value="'+st.rates.EUR+'" style="width:80px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text)"><span style="font-size:12px;color:var(--text3)">K\u010d za 1 EUR</span></div>'
      +'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:13px;font-weight:600;flex:1">USD</span><input id="stp-usd" type="number" value="'+st.rates.USD+'" style="width:80px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface);color:var(--text)"><span style="font-size:12px;color:var(--text3)">K\u010d za 1 USD</span></div>'

  +card(

  )
